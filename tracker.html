<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <i class="ti ti-chart-dots-3"></i>
      <span>Lead Tracker</span>
    </div>
    <button class="sidebar-close" id="sidebarClose"><i class="ti ti-x"></i></button>
  </div>
  <ul class="nav-list">
    <li><a href="#" class="nav-item active" data-page="dashboard"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></a></li>
    <li><a href="#" class="nav-item" data-page="contacts"><i class="ti ti-users"></i><span>Kontakte</span></a></li>
    <li><a href="#" class="nav-item" data-page="calendar"><i class="ti ti-calendar-week"></i><span>Wochenplan</span></a></li>
    <li><a href="#" class="nav-item" data-page="export"><i class="ti ti-file-export"></i><span>Export / Monday</span></a></li>
    <li><a href="#" class="nav-item" data-page="settings"><i class="ti ti-settings"></i><span>Einstellungen</span></a></li>
  </ul>
</nav>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- MAIN -->
<div class="main-wrap">
  <header class="topbar">
    <button class="menu-btn" id="menuBtn"><i class="ti ti-menu-2"></i></button>
    <h1 class="page-title" id="pageTitle">Dashboard</h1>
    <button class="btn-primary" id="topAddBtn"><i class="ti ti-plus"></i> Neu</button>
  </header>

  <main class="content" id="content">
    <!-- Pages injected by JS -->
  </main>
</div>

<!-- MODAL: Kontakt anlegen / bearbeiten -->
<div class="modal-backdrop" id="contactModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Kontakt anlegen</h2>
      <button class="icon-btn" id="closeModal"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>Vorname</label><input type="text" id="f_vorname" placeholder="Max" /></div>
        <div class="field"><label>Nachname</label><input type="text" id="f_nachname" placeholder="Mustermann" /></div>
        <div class="field"><label>Telefonnummer</label><input type="tel" id="f_telefon" placeholder="+49 171 1234567" /></div>
        <div class="field"><label>E-Mail</label><input type="email" id="f_email" placeholder="max@beispiel.de" /></div>
        <div class="field"><label>Ort</label><input type="text" id="f_ort" placeholder="Berlin" /></div>
        <div class="field"><label>Thema</label><input type="text" id="f_thema" placeholder="Finanzierung, Versicherung..." /></div>
        <div class="field"><label>Quelle</label>
          <input type="text" id="f_quelle" placeholder="z.B. Empfehlung, Messe, Instagram..." />
        </div>
        <div class="field"><label>Status</label>
          <input type="text" id="f_status" placeholder="z.B. Neu, Kontaktiert, Termin..." />
        </div>
        <div class="field full"><label>Absagegrund</label><input type="text" id="f_absagegrund" placeholder="Grund der Absage (falls vorhanden)" /></div>
        <div class="field full"><label>Notizen</label><textarea id="f_notizen" rows="3" placeholder="Weitere Informationen..."></textarea></div>

        <!-- WIEDERVORLAGE -->
        <div class="field full" style="border-top:1px solid var(--border);padding-top:16px;margin-top:4px;">
          <label style="font-size:13px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;">
            <i class="ti ti-calendar-event" style="color:var(--purple);font-size:16px;"></i> Wiedervorlage / Termin einplanen
          </label>
        </div>

        <!-- Custom Date+Time Picker -->
        <div class="field full" id="f_wv_datepicker_wrap">
          <label style="font-size:12px;color:var(--text3);font-weight:500;">Datum &amp; Uhrzeit</label>
          <!-- hidden real input for form value -->
          <input type="datetime-local" id="f_wiedervorlage" style="display:none;" />
          <!-- Visual picker -->
          <div id="wv_picker" style="background:var(--bg3);border:1px solid var(--border2);border-radius:12px;overflow:hidden;">
            <!-- Month nav + calendar -->
            <div style="padding:12px 14px 8px;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <button type="button" id="wv_prevMonth" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:6px;" title="Vorheriger Monat">‹</button>
                <span id="wv_monthLabel" style="font-size:14px;font-weight:600;color:var(--text);"></span>
                <button type="button" id="wv_nextMonth" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:6px;" title="Nächster Monat">›</button>
              </div>
              <!-- Day headers -->
              <div id="wv_dayheaders" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;"></div>
              <!-- Day cells injected by JS -->
              <div id="wv_daygrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;"></div>
            </div>
            <!-- Time row -->
            <div style="padding:10px 14px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <i class="ti ti-clock" style="color:var(--text3);font-size:16px;"></i>
              <span style="font-size:13px;color:var(--text2);">Uhrzeit:</span>
              <select id="wv_hour" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 10px;font-size:14px;font-family:inherit;outline:none;cursor:pointer;">
              </select>
              <span style="color:var(--text2);font-size:16px;font-weight:600;">:</span>
              <select id="wv_minute" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 10px;font-size:14px;font-family:inherit;outline:none;cursor:pointer;">
              </select>
              <span id="wv_selected_display" style="margin-left:auto;font-size:12px;color:var(--purple);font-weight:500;"></span>
            </div>
          </div>
        </div>

        <!-- Art (dynamic from settings) -->
        <div class="field">
          <label>Terminart</label>
          <select id="f_wv_type">
            <option value="">– kein Termin –</option>
          </select>
        </div>
        <div class="field full">
          <label>Notiz zur Wiedervorlage</label>
          <input type="text" id="f_wv_note" placeholder="Worum geht es beim nächsten Kontakt?" />
        </div>
        <div class="field full" id="f_wv_email_options" style="display:none;">
          <div style="display:flex;flex-direction:column;gap:8px;background:var(--bg3);border-radius:8px;padding:12px;">
            <label style="font-size:12px;color:var(--text3);font-weight:600;">E-Mail-Benachrichtigungen an Kontakt</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;">
              <input type="checkbox" id="f_wv_confirm" />
              📧 Terminbestätigung senden <span style="font-size:11px;color:var(--accent);margin-left:4px;">(1 Tag vorher)</span>
            </label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;">
              <input type="checkbox" id="f_wv_reminder" />
              🔔 Terminerinnerung senden <span style="font-size:11px;color:var(--amber);margin-left:4px;">(Termintag um 09:00)</span>
            </label>
          </div>
        </div>

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="cancelModal">Abbrechen</button>
      <button class="btn-primary" id="saveContact"><i class="ti ti-device-floppy"></i> Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: Kontaktverlauf Eintrag -->
<div class="modal-backdrop" id="historyModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>Kontaktverlauf</h2>
      <button class="icon-btn" id="closeHistoryModal"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Art</label>
        <select id="h_type">
          <option value="anruf">📞 Anruf</option>
          <option value="email">📧 E-Mail</option>
          <option value="termin">📅 Termin</option>
          <option value="notiz">📝 Notiz</option>
          <option value="whatsapp">💬 WhatsApp</option>
        </select>
      </div>
      <div class="field"><label>Datum & Uhrzeit</label><input type="datetime-local" id="h_datetime" /></div>
      <div class="field"><label>Ergebnis / Notiz</label><textarea id="h_note" rows="3" placeholder="Was wurde besprochen?"></textarea></div>
      <div class="field"><label>Folgetermin (optional)</label><input type="datetime-local" id="h_followup" /></div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="h_gcal" /> In Google Kalender eintragen
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="cancelHistoryModal">Abbrechen</button>
      <button class="btn-primary" id="saveHistory"><i class="ti ti-device-floppy"></i> Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: Termin einplanen – schöne Buchungsmaske -->
<div class="modal-backdrop" id="callSlotModal" style="align-items:flex-start;padding:16px;overflow-y:auto;">
  <div class="modal" style="max-width:560px;width:100%;margin:auto;">
    <div class="modal-header">
      <h2 id="csModalTitle">Termin einplanen</h2>
      <button class="icon-btn" id="closeCallSlotModal"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" style="padding:0;">

      <!-- Hidden legacy inputs for app.js compatibility -->
      <input type="hidden" id="cs_datetime" />
      <input type="hidden" id="cs_type" value="fix" />

      <!-- STEP 1: Kontakt + Terminart -->
      <div id="cs_step1" style="padding:20px 24px;">
        <div class="field" style="margin-bottom:16px;">
          <label>Kontakt</label>
          <select id="cs_contact" style="width:100%;"></select>
        </div>

        <label style="font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:10px;">Terminart wählen</label>
        <div id="cs_appttype_pills" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;"></div>
        <!-- hidden select for app.js compatibility -->
        <select id="cs_appttype" style="display:none;"></select>

        <button class="btn-primary" id="cs_step1Next" style="margin-top:20px;">
          Weiter <i class="ti ti-arrow-right"></i>
        </button>
      </div>

      <!-- STEP 2: Kalender + Zeitslots -->
      <div id="cs_step2" style="display:none;padding:20px 24px;">
        <!-- Calendar nav -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <button id="cs_calPrev" style="background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);color:var(--purple);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:16px;">‹</button>
          <span id="cs_calTitle" style="font-weight:700;font-size:15px;color:var(--text);"></span>
          <button id="cs_calNext" style="background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);color:var(--purple);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:16px;">›</button>
        </div>
        <div id="cs_calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;"></div>

        <!-- Time slots -->
        <div id="cs_timeSection" style="display:none;border-top:1px solid var(--border);padding-top:16px;margin-top:4px;">
          <div style="font-size:12px;color:var(--purple);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;" id="cs_timeSectionTitle">Uhrzeit wählen</div>
          <div id="cs_timeGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;"></div>
          <p id="cs_noTimesMsg" style="display:none;color:var(--text3);font-size:13px;margin-top:8px;">Keine freien Zeiten an diesem Tag.</p>
        </div>

        <div style="display:flex;gap:8px;margin-top:20px;">
          <button class="btn-ghost" id="cs_step2Back" style="flex:1;"><i class="ti ti-arrow-left"></i> Zurück</button>
          <button class="btn-primary" id="cs_step2Next" style="flex:2;" disabled>Weiter <i class="ti ti-arrow-right"></i></button>
        </div>
      </div>

      <!-- STEP 3: Notiz + E-Mail -->
      <div id="cs_step3" style="display:none;padding:20px 24px;">
        <!-- Summary -->
        <div id="cs_summary" style="background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:14px;line-height:1.8;"></div>

        <div class="field full" style="margin-bottom:14px;">
          <label>Interne Notiz <span style="font-weight:400;color:var(--text3);font-size:11px;">(nur für dich)</span></label>
          <textarea id="cs_note" rows="2" placeholder="Worum geht es? Was soll besprochen werden?"></textarea>
        </div>

        <div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:4px;">
          <label style="font-size:12px;color:var(--text3);font-weight:600;display:block;margin-bottom:8px;">E-Mail-Benachrichtigungen an Kontakt</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;margin-bottom:6px;">
            <input type="checkbox" id="cs_confirm" />
            📧 Terminbestätigung senden <span style="font-size:11px;color:var(--accent);margin-left:4px;">(1 Tag vorher)</span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;">
            <input type="checkbox" id="cs_reminder" />
            🔔 Terminerinnerung senden <span style="font-size:11px;color:var(--amber);margin-left:4px;">(Termintag um 09:00)</span>
          </label>
        </div>

        <div style="display:flex;gap:8px;margin-top:20px;">
          <button class="btn-ghost" id="cs_step3Back" style="flex:1;"><i class="ti ti-arrow-left"></i> Zurück</button>
          <button class="btn-primary" id="saveCallSlot" style="flex:2;"><i class="ti ti-calendar-plus"></i> Einplanen</button>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
/* ── Business Inbox ────────────────────────────────────── */
.business-inbox-card {
  background: rgba(99,102,241,0.06);
  border: 1px solid rgba(99,102,241,0.2);
  border-left: 4px solid var(--purple, #6366f1);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 10px;
  transition: border-color .15s;
}
.business-inbox-card:hover {
  border-color: rgba(99,102,241,0.4);
}

/* ── Private Inbox ─────────────────────────────────────── */
.private-inbox-card {
  background: rgba(245,158,11,0.06);
  border: 1px solid rgba(245,158,11,0.2);
  border-left: 4px solid var(--amber, #f59e0b);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 10px;
  transition: border-color .15s;
}
.private-inbox-card:hover {
  border-color: rgba(245,158,11,0.4);
}
.private-inbox-btn-confirm {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px; border: none;
  background: rgba(16,185,129,0.15); color: #10b981;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background .15s; font-family: inherit;
}
.private-inbox-btn-confirm:hover { background: rgba(16,185,129,0.28); }
.private-inbox-btn-alt {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  border: 1px solid rgba(245,158,11,0.4); background: transparent;
  color: var(--amber, #f59e0b); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background .15s; font-family: inherit;
}
.private-inbox-btn-alt:hover { background: rgba(245,158,11,0.12); }
.private-inbox-btn-reject {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  border: 1px solid rgba(239,68,68,0.3); background: transparent;
  color: var(--red, #ef4444); font-size: 13px;
  cursor: pointer; transition: background .15s; font-family: inherit;
}
.private-inbox-btn-reject:hover { background: rgba(239,68,68,0.1); }

/* Step dots for booking modal */
#callSlotModal .cs-step-dots {
  display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 0 0;
}
#callSlotModal .cs-dot {
  width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .2s;
}
#callSlotModal .cs-dot.active { background:var(--purple);width:20px;border-radius:4px; }
#callSlotModal .cs-dot.done { background:var(--green); }

/* Calendar day styles */
.cs-cal-day {
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:6px;font-size:12px;font-weight:500;transition:all .15s;
}
.cs-cal-day.header { font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase; }
.cs-cal-day.empty,.cs-cal-day.past { color:var(--text3);opacity:.3; }
.cs-cal-day.unavail { color:var(--text3);opacity:.3; }
.cs-cal-day.free { background:rgba(139,92,246,0.12);color:var(--purple);border:1px solid rgba(139,92,246,0.25);cursor:pointer; }
.cs-cal-day.free:hover { background:rgba(139,92,246,0.25); }
.cs-cal-day.selected { background:var(--purple);color:#fff;font-weight:700; }

/* Time slot styles */
.cs-time-slot {
  padding:9px 4px;text-align:center;border-radius:7px;font-size:13px;
  font-weight:500;cursor:pointer;transition:all .15s;
  background:rgba(139,92,246,0.08);color:var(--purple);
  border:1px solid rgba(139,92,246,0.2);
}
.cs-time-slot:hover { background:rgba(139,92,246,0.2); }
.cs-time-slot.taken { background:rgba(255,255,255,0.03);color:var(--text3);border-color:rgba(255,255,255,0.08);cursor:default;opacity:.5; }
.cs-time-slot.selected { background:var(--purple);color:#fff;font-weight:700;border-color:var(--purple); }

/* Appt type pills */
.cs-appt-pill {
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 14px;border-radius:20px;font-size:13px;font-weight:500;
  cursor:pointer;border:2px solid transparent;transition:all .15s;
  background:var(--bg3);color:var(--text2);
}
.cs-appt-pill.selected { border-color:currentColor;background:rgba(139,92,246,0.1); }
</style>

<script type="module" src="app.js?v=3"></script>
<!-- Auth-Loading: festes Overlay außerhalb von #content, damit JS-Fehler es nicht verstecken -->
<div id="auth-loading" style="
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg, #0f172a);
">
  <div style="text-align:center;color:var(--text3,#94a3b8);">
    <div style="font-size:36px;margin-bottom:14px;">🔒</div>
    <p id="auth-loading-msg" style="font-size:14px;">Authentifizierung wird geprüft…</p>
  </div>
</div>

<script>
  // Absoluter Notfall-Fallback: rein in HTML, kein Firebase nötig.
  // Falls app.js nicht lädt oder einen Syntaxfehler hat, verschwindet
  // der Screen trotzdem nach 10s und zeigt eine Fehlermeldung.
  (function() {
    var el = document.getElementById('auth-loading');
    var msg = document.getElementById('auth-loading-msg');
    if (!el) return;

    // Nach 6s: Hinweis dass es länger dauert
    setTimeout(function() {
      if (el.style.display === 'none' || el.style.display === '') return;
      if (msg) msg.textContent = 'Verbindung wird aufgebaut…';
    }, 6000);

    // Nach 20s: Fehlermeldung + Reload-Button
    setTimeout(function() {
      if (el.style.display === 'none' || el.style.display === '') return;
      el.innerHTML = '<div style="text-align:center;padding:32px;max-width:340px;">'
        + '<div style="font-size:36px;margin-bottom:14px;">⚠️</div>'
        + '<p style="font-size:15px;font-weight:600;color:#f8fafc;margin-bottom:8px;">Verbindung fehlgeschlagen</p>'
        + '<p style="font-size:13px;color:#94a3b8;margin-bottom:20px;line-height:1.6;">Firebase konnte nicht erreicht werden. Bitte Internetverbindung prüfen.</p>'
        + '<button onclick="location.reload()" style="'
        + 'background:#3b82f6;color:#fff;border:none;border-radius:10px;'
        + 'padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">'
        + '↺ Neu laden</button>'
        + '</div>';
    }, 10000);
  })();
</script>
</body>
</html>
