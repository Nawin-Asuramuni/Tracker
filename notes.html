<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notizen – Lead Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --bg2:      #1e293b;
      --bg3:      #273449;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --text:     #f1f5f9;
      --text2:    #94a3b8;
      --text3:    #64748b;
      --purple:   #a78bfa;
      --accent:   #3b82f6;
      --green:    #22c55e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --teal:     #14b8a6;

      /* Kategorie-Farben */
      --mandant:   #3b82f6;
      --privat:    #f59e0b;
      --mitarb:    #a78bfa;
      --mandantm:  #14b8a6;
      --eigen:     #22c55e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      height: 56px;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-back {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text2); font-size: 13px; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all .15s;
    }
    .topbar-back:hover { color: var(--text); border-color: var(--accent); }
    .topbar-title {
      flex: 1; font-size: 16px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .topbar-title i { color: var(--purple); font-size: 18px; }

    /* ── SEARCH ── */
    .search-wrap {
      padding: 20px 20px 0;
      max-width: 900px; margin: 0 auto;
    }
    .search-box {
      position: relative;
    }
    .search-box i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 18px; pointer-events: none;
    }
    .search-box input {
      width: 100%; padding: 12px 16px 12px 44px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 12px; color: var(--text);
      font-family: inherit; font-size: 14px; outline: none;
      transition: border-color .15s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text3); }
    .search-clear {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 18px; display: none;
      padding: 2px; border-radius: 4px;
    }
    .search-clear:hover { color: var(--text); }
    .search-meta {
      font-size: 12px; color: var(--text3);
      margin-top: 8px; padding-left: 4px; min-height: 18px;
    }

    /* ── FILTER TABS ── */
    .filter-bar {
      padding: 16px 20px 0;
      max-width: 900px; margin: 0 auto;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .filter-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 20px;
      border: 1.5px solid var(--border2);
      background: transparent; color: var(--text2);
      font-family: inherit; font-size: 13px; font-weight: 400;
      cursor: pointer; transition: all .15s;
    }
    .filter-tab:hover { border-color: var(--border); color: var(--text); }
    .filter-tab.active {
      font-weight: 600;
    }
    .filter-tab .count {
      font-size: 11px; opacity: .65;
    }
    .filter-tab[data-cat="all"].active   { border-color: var(--accent);   background: rgba(59,130,246,.12);  color: var(--accent);   }
    .filter-tab[data-cat="mandant"].active { border-color: var(--mandant); background: rgba(59,130,246,.12);  color: var(--mandant);  }
    .filter-tab[data-cat="privat"].active  { border-color: var(--privat);  background: rgba(245,158,11,.12);  color: var(--privat);   }
    .filter-tab[data-cat="mitarbeiter"].active { border-color: var(--mitarb); background: rgba(167,139,250,.12); color: var(--mitarb); }
    .filter-tab[data-cat="mandantMitarbeiter"].active { border-color: var(--mandantm); background: rgba(20,184,166,.12); color: var(--mandantm); }
    .filter-tab[data-cat="eigen"].active   { border-color: var(--eigen);   background: rgba(34,197,94,.12);   color: var(--eigen);    }

    /* ── CONTENT ── */
    .content {
      max-width: 900px; margin: 0 auto;
      padding: 20px 20px 80px;
    }

    /* ── NOTE CARD ── */
    .notes-grid {
      display: flex; flex-direction: column; gap: 10px;
    }
    .note-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .note-card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

    .note-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 10px;
    }
    .note-cat-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .note-person {
      flex: 1; font-size: 13px; font-weight: 600; color: var(--text);
    }
    .note-cat-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
      padding: 2px 8px; border-radius: 10px; text-transform: uppercase;
    }
    .note-date {
      font-size: 11px; color: var(--text3);
      font-family: 'DM Mono', monospace;
    }

    .note-body {
      padding: 0 16px 14px;
      font-size: 13px; color: var(--text2);
      line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    }
    .note-body mark {
      background: rgba(167,139,250,.35); color: var(--text);
      border-radius: 3px; padding: 0 2px;
    }

    .note-card-footer {
      padding: 8px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
    }
    .note-source {
      font-size: 11px; color: var(--text3);
      display: flex; align-items: center; gap: 4px;
    }
    .note-actions { display: flex; gap: 4px; }
    .note-btn {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 15px; padding: 4px 6px;
      border-radius: 6px; transition: all .15s;
      display: flex; align-items: center;
    }
    .note-btn:hover { background: var(--bg3); color: var(--text); }
    .note-btn.danger:hover { color: var(--red); }

    /* ── EIGENE NOTIZ: Neue Notiz-Schaltfläche ── */
    .fab {
      position: fixed; bottom: 28px; right: 24px;
      display: flex; align-items: center; gap: 8px;
      padding: 12px 20px; border-radius: 30px;
      background: var(--purple); color: #fff;
      font-family: inherit; font-size: 14px; font-weight: 600;
      border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(167,139,250,.4);
      transition: all .2s; z-index: 50;
    }
    .fab:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(167,139,250,.5); }

    /* ── MODAL ── */
    .modal-bd {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 200;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-bd.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 18px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      animation: modalIn .2s ease;
    }
    @keyframes modalIn { from { opacity:0; transform:translateY(16px) scale(.97); } }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer {
      padding: 14px 24px 20px;
      display: flex; gap: 8px; justify-content: flex-end;
      border-top: 1px solid var(--border);
    }

    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text3); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .field input, .field textarea, .field select {
      width: 100%; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; color: var(--text);
      font-family: inherit; font-size: 14px; outline: none;
      transition: border-color .15s; resize: vertical;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--bg2); }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 10px;
      background: var(--accent); color: #fff;
      font-family: inherit; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 10px;
      background: transparent; color: var(--text2);
      font-family: inherit; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border2); cursor: pointer; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--text3); color: var(--text); }
    .icon-btn {
      background: none; border: none; color: var(--text2);
      cursor: pointer; font-size: 20px; padding: 4px; border-radius: 6px;
    }
    .icon-btn:hover { color: var(--text); }

    /* ── EMPTY ── */
    .empty {
      text-align: center; padding: 64px 20px;
      color: var(--text3);
    }
    .empty i { font-size: 48px; display: block; margin-bottom: 14px; opacity: .4; }
    .empty p { font-size: 15px; }
    .empty small { font-size: 13px; margin-top: 6px; display: block; }

    /* ── LOADING ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 60px 20px; color: var(--text3);
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text); font-size: 13px; font-weight: 500;
      padding: 10px 18px; border-radius: 10px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.3); z-index: 999;
      animation: toastIn .2s ease, toastOut .3s ease 2.7s forwards;
    }
    .toast.success i { color: var(--green); }
    .toast.error i { color: var(--red); }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } }
    @keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(10px); } }

    /* ── SECTION HEADING ── */
    .section-heading {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text3);
      padding: 20px 0 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-heading::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="topbar-back">
    <i class="ti ti-arrow-left"></i> Zurück
  </a>
  <div class="topbar-title">
    <i class="ti ti-notes"></i>
    Notizen
  </div>
  <div id="syncStatus" style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;">

    Laden…
  </div>
</div>

<!-- SUCHE -->
<div class="search-wrap">
  <div class="search-box">
    <i class="ti ti-search"></i>
    <input type="text" id="searchInput" placeholder="Notizen durchsuchen…" autocomplete="off" />
    <button class="search-clear" id="searchClear" title="Suche löschen"><i class="ti ti-x"></i></button>
  </div>
  <div class="search-meta" id="searchMeta"></div>
</div>

<!-- FILTER TABS -->
<div class="filter-bar" id="filterBar">
  <button class="filter-tab active" data-cat="all">
    <i class="ti ti-layout-list" style="font-size:14px;"></i> Alle <span class="count" id="cnt-all"></span>
  </button>
  <button class="filter-tab" data-cat="mandant" style="color:#3b82f6;">
    <i class="ti ti-briefcase" style="font-size:13px;"></i> Mandanten <span class="count" id="cnt-mandant"></span>
  </button>
  <button class="filter-tab" data-cat="privat" style="color:#f59e0b;">
    <i class="ti ti-heart" style="font-size:13px;"></i> Privat <span class="count" id="cnt-privat"></span>
  </button>
  <button class="filter-tab" data-cat="mitarbeiter" style="color:#a78bfa;">
    <i class="ti ti-users" style="font-size:13px;"></i> Mitarbeiter <span class="count" id="cnt-mitarbeiter"></span>
  </button>
  <button class="filter-tab" data-cat="mandantMitarbeiter" style="color:#14b8a6;">

  <button class="filter-tab" data-cat="eigen" style="color:#22c55e;">

<!-- HAUPTINHALT -->
<div class="content">

    </div>

</div>

<!-- FAB: Neue eigene Notiz -->
<button class="fab" id="fabNewNote">
  <i class="ti ti-plus"></i> Neue Notiz
</button>

<!-- MODAL: Eigene Notiz erstellen / bearbeiten -->
<div class="modal-bd" id="noteModal">
  <div class="modal">
    <div class="modal-header">
      <h2><i class="ti ti-pencil" style="color:var(--purple);"></i> <span id="noteModalTitle">Eigene Notiz</span></h2>

<!-- MODAL: Notiz lesen / Vollansicht -->
<div class="modal-bd" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="viewTitle" style="font-size:15px;max-width:420px;word-break:break-word;"></h2>
      <button class="icon-btn" id="closeViewModal"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="viewBody" style="font-size:14px;color:var(--text2);white-space:pre-wrap;line-height:1.7;"></div>
    <div class="modal-footer" id="viewFooter"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, deleteDoc, onSnapshot, orderBy, query, serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";
import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";

// ── Firebase ──
const firebaseConfig = {
  apiKey:            "AIzaSyBxiDftvsNOfElvrt8hhLaUA0HDoSyuK-g",
  authDomain:        "tracking-74513.firebaseapp.com",
  projectId:         "tracking-74513",
  storageBucket:     "tracking-74513.firebasestorage.app",
  messagingSenderId: "621239887005",
  appId:             "1:621239887005:web:5b962abff5c9109a546074",
};
const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const auth  = getAuth(fbApp);

// ── STATE ──
let contacts    = [];   // Alle Kontakte aus Firestore
let ownNotes    = [];   // Eigene Notizen aus Firestore-Collection "ownNotes"
let activeFilter = 'all';
let searchQuery  = '';
let editingNoteId = null;

// ── KATEGORIE-KONFIGURATION ──
const CAT = {
  mandant:            { label: 'Mandant',              color: '#3b82f6', dot: '#3b82f6', icon: 'ti-briefcase' },
  privat:             { label: 'Privat',               color: '#f59e0b', dot: '#f59e0b', icon: 'ti-heart' },
  mitarbeiter:        { label: 'Mitarbeiter',          color: '#a78bfa', dot: '#a78bfa', icon: 'ti-users' },
  mandantMitarbeiter: { label: 'Mandant (MA)',         color: '#14b8a6', dot: '#14b8a6', icon: 'ti-user-plus' },
  eigen:              { label: 'Eigene Notiz',         color: '#22c55e', dot: '#22c55e', icon: 'ti-pencil' },
};

// ── HELPERS ──
function toast(msg, type = 'success') {
  const icon = type === 'success' ? 'ti-check' : 'ti-alert-circle';
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i class="ti ${icon}"></i> ${msg}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)    return 'Gerade eben';
  if (diff < 3600)  return `vor ${Math.floor(diff / 60)} Min.`;
  if (diff < 86400) return `vor ${Math.floor(diff / 3600)} Std.`;
  return d.toLocaleDateString('de-DE', { day:'2-digit', month:'short', year:'numeric' });
}

function highlight(text, q) {
  if (!q || !text) return escHtml(text || '');
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setSyncStatus(msg, ok = true) {
  const el = document.getElementById('syncStatus');
  el.innerHTML = ok
    ? `<i class="ti ti-cloud-check" style="color:var(--green);font-size:14px;"></i> ${msg}`
    : `<i class="ti ti-cloud-exclamation" style="color:var(--amber);font-size:14px;"></i> ${msg}`;
}

// ── DATEN AUFBEREITEN ──

/**
 * Alle Notizen aus Kontakten extrahieren.
 * Jede Notiz bekommt: id, personId, person, category, text, updatedAt, source='contact'
 */
function buildContactNotes() {
  const out = [];
  for (const c of contacts) {
    const cat  = c.contactCategory || null;
    const name = `${c.vorname || ''} ${c.nachname || ''}`.trim() || '—';
    // Hauptnotiz
    if (c.notizen && c.notizen.trim()) {
      out.push({
        id:        `contact-${c.id}-notiz`,
        personId:  c.id,
        person:    name,
        category:  cat,
        title:     `Notiz – ${name}`,
        text:      c.notizen,
        updatedAt: c.updatedAt || c.createdAt || null,
        source:    'contact',
        _contact:  c,
      });
    }
    // Wiedervorlage-Notiz
    if (c.wvNote && c.wvNote.trim()) {
      out.push({
        id:        `contact-${c.id}-wvnote`,
        personId:  c.id,
        person:    name,
        category:  cat,
        title:     `Terminnotiz – ${name}`,
        text:      c.wvNote,
        updatedAt: c.updatedAt || c.createdAt || null,
        source:    'contact',
        _contact:  c,
      });
    }
    // Kontaktverlauf-Notizen
    if (Array.isArray(c.history)) {
      for (const h of c.history) {
        if (h.note && h.note.trim()) {
          out.push({
            id:        `contact-${c.id}-hist-${h.datetime}`,
            personId:  c.id,
            person:    name,
            category:  cat,
            title:     `Verlauf – ${name}`,
            text:      h.note,
            updatedAt: h.datetime ? { toDate: () => new Date(h.datetime) } : null,
            source:    'contact',
            _contact:  c,
            historyType: h.type,
          });
        }
      }
    }
  }
  return out;
}

function allNotes() {
  const contactNotes = buildContactNotes().map(n => ({ ...n, _isOwn: false }));
  const own          = ownNotes.map(n => ({ ...n, category: 'eigen', _isOwn: true, source: 'own' }));
  return [...contactNotes, ...own].sort((a, b) => {
    const ta = a.updatedAt?.toDate ? a.updatedAt.toDate() : new Date(a.updatedAt || 0);
    const tb = b.updatedAt?.toDate ? b.updatedAt.toDate() : new Date(b.updatedAt || 0);
    return tb - ta;
  });
}

// ── RENDER ──
function render() {
  const q    = searchQuery.toLowerCase().trim();
  const cat  = activeFilter;
  let notes  = allNotes();

  // Filter nach Kategorie
  if (cat !== 'all') {
    notes = notes.filter(n => n.category === cat);
  }

  // Suche
  if (q) {
    notes = notes.filter(n =>
      (n.title  || '').toLowerCase().includes(q) ||
      (n.text   || '').toLowerCase().includes(q) ||
      (n.person || '').toLowerCase().includes(q) ||
      (n.tags   || []).some(t => t.toLowerCase().includes(q))
    );
  }

  // Counts für Tabs
  const all = allNotes();
  const counts = {
    all:                all.length,
    mandant:            all.filter(n => n.category === 'mandant').length,
    privat:             all.filter(n => n.category === 'privat').length,
    mitarbeiter:        all.filter(n => n.category === 'mitarbeiter').length,
    mandantMitarbeiter: all.filter(n => n.category === 'mandantMitarbeiter').length,
    eigen:              all.filter(n => n.category === 'eigen').length,
  };
  for (const [k, v] of Object.entries(counts)) {
    const el = document.getElementById(`cnt-${k}`);
    if (el) el.textContent = `(${v})`;
  }

  const list = document.getElementById('notesList');

  if (notes.length === 0) {
    const isSearch = q.length > 0;
    list.innerHTML = `
      <div class="empty">
        <i class="ti ${isSearch ? 'ti-search-off' : 'ti-notes'}"></i>
        <p>${isSearch ? 'Keine Treffer für „' + escHtml(q) + '"' : 'Keine Notizen in dieser Kategorie.'}</p>
        ${!isSearch && cat === 'eigen' ? `<small>Klicke auf <strong>+ Neue Notiz</strong> um eine eigene Notiz zu erstellen.</small>` : ''}
      </div>`;
    return;
  }

  // Gruppen: Heute / Diese Woche / Früher
  const now   = new Date();
  const today = new Date(now); today.setHours(0,0,0,0);
  const weekAgo = new Date(today); weekAgo.setDate(today.getDate() - 7);

  const grouped = { today: [], week: [], older: [] };
  for (const n of notes) {
    const d = n.updatedAt?.toDate ? n.updatedAt.toDate() : new Date(n.updatedAt || 0);
    if (d >= today) grouped.today.push(n);
    else if (d >= weekAgo) grouped.week.push(n);
    else grouped.older.push(n);
  }

  let html = '';
  const sections = [
    { key: 'today', label: 'Heute' },
    { key: 'week',  label: 'Diese Woche' },
    { key: 'older', label: 'Früher' },
  ];
  for (const sec of sections) {
    if (!grouped[sec.key].length) continue;
    html += `<div class="section-heading">${sec.label}</div>`;
    for (const n of grouped[sec.key]) {
      html += renderCard(n, q);
    }
  }

  if (q) {
    document.getElementById('searchMeta').textContent =
      `${notes.length} Treffer für „${q}"`;
  } else {
    document.getElementById('searchMeta').textContent = '';
  }

  list.innerHTML = html;
}

function renderCard(n, q) {
  const cfg   = n.category ? CAT[n.category] : null;
  const dot   = cfg ? cfg.dot   : '#64748b';
  const label = cfg ? cfg.label : '—';
  const bg    = cfg ? cfg.dot + '18' : 'transparent';
  const border= cfg ? cfg.dot + '40' : 'var(--border2)';

  const preview = (n.text || '').slice(0, 240) + ((n.text || '').length > 240 ? '…' : '');
  const dateStr = fmtDate(n.updatedAt);

  const typeIcon = n.historyType
    ? (n.historyType === 'anruf' ? '📞' : n.historyType === 'email' ? '📧' : n.historyType === 'termin' ? '📅' : n.historyType === 'whatsapp' ? '💬' : '📝')
    : '';

  const tagsHtml = n.tags?.length
    ? `<div style="display:flex;gap:4px;flex-wrap:wrap;padding:0 16px 10px;">
        ${n.tags.map(t => `<span style="font-size:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);border-radius:6px;padding:1px 7px;">${escHtml(t)}</span>`).join('')}
       </div>`
    : '';

  return `
  <div class="note-card" style="border-color:${border};border-left:3px solid ${dot};">
    <div class="note-card-header">
      <div class="note-cat-dot" style="background:${dot};"></div>
      <div class="note-person">${typeIcon ? typeIcon + ' ' : ''}${highlight(n.title || n.person, q)}</div>
      ${cfg ? `<span class="note-cat-badge" style="background:${bg};color:${dot};">${label}</span>` : ''}
      <span class="note-date">${dateStr}</span>
    </div>
    <div class="note-body">${highlight(preview, q)}</div>
    ${tagsHtml}
    <div class="note-card-footer">
      <div class="note-source">
        ${n.source === 'contact'
          ? `<i class="ti ti-user" style="font-size:12px;"></i> Aus Kontakt`
          : `<i class="ti ti-pencil" style="font-size:12px;"></i> Eigene Notiz`}
      </div>
      <div class="note-actions">
        <button class="note-btn" onclick="viewNote('${n.id}')" title="Vollansicht">
          <i class="ti ti-eye"></i>
        </button>
        ${n._isOwn ? `
        <button class="note-btn" onclick="editNote('${n.id}')" title="Bearbeiten">
          <i class="ti ti-edit"></i>
        </button>
        <button class="note-btn danger" onclick="deleteNote('${n.id}')" title="Löschen">
          <i class="ti ti-trash"></i>
        </button>` : `
        <button class="note-btn" onclick="goToContact('${n.personId}')" title="Kontakt öffnen">
          <i class="ti ti-arrow-right"></i>
        </button>`}
      </div>
    </div>
  </div>`;
}

// ── VOLLANSICHT ──
window.viewNote = function(id) {
  const n = allNotes().find(x => x.id === id);
  if (!n) return;
  const cfg = n.category ? CAT[n.category] : null;
  document.getElementById('viewTitle').textContent = n.title || n.person || 'Notiz';
  document.getElementById('viewBody').innerHTML = escHtml(n.text || '');
  const footer = document.getElementById('viewFooter');
  footer.innerHTML = n._isOwn
    ? `<button class="btn-ghost" onclick="document.getElementById('viewModal').classList.remove('open');editNote('${n.id}')">
        <i class="ti ti-edit"></i> Bearbeiten
       </button>`
    : (n.personId ? `<button class="btn-ghost" onclick="goToContact('${n.personId}')">
        <i class="ti ti-user"></i> Kontakt öffnen
       </button>` : '');
  document.getElementById('viewModal').classList.add('open');
};

window.goToContact = function(contactId) {
  // Zurück zum Tracker mit direktem Kontakt
  sessionStorage.setItem('openContact', contactId);
  window.location.href = 'index.html';
};

// ── EIGENE NOTIZEN – CRUD ──
window.editNote = function(id) {
  const n = ownNotes.find(x => x.id === id);
  if (!n) return;
  editingNoteId = id;
  document.getElementById('noteModalTitle').textContent = 'Notiz bearbeiten';
  document.getElementById('n_title').value = n.title || '';
  document.getElementById('n_body').value  = n.text  || '';
  document.getElementById('n_tags').value  = (n.tags || []).join(', ');
  document.getElementById('noteModal').classList.add('open');
};

window.deleteNote = async function(id) {
  if (!confirm('Notiz wirklich löschen?')) return;
  try {
    await deleteDoc(doc(db, 'ownNotes', id));
    toast('Notiz gelöscht.');
  } catch(e) {
    ownNotes = ownNotes.filter(n => n.id !== id);
    render();
    toast('Notiz gelöscht (offline).');
  }
};

document.getElementById('saveNote').addEventListener('click', async () => {
  const title = document.getElementById('n_title').value.trim();
  const text  = document.getElementById('n_body').value.trim();
  const tagsRaw = document.getElementById('n_tags').value.trim();
  const tags  = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  if (!text) { toast('Bitte Notiztext eingeben.', 'error'); return; }

  const data = { title, text, tags, updatedAt: serverTimestamp() };

  try {
    if (editingNoteId) {
      await updateDoc(doc(db, 'ownNotes', editingNoteId), data);
      toast('Notiz aktualisiert!');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, 'ownNotes'), data);
      toast('Notiz gespeichert!');
    }
    closeNoteModal();
  } catch(e) {
    console.error(e);
    // Offline-Fallback
    if (editingNoteId) {
      const idx = ownNotes.findIndex(n => n.id === editingNoteId);
      if (idx !== -1) { ownNotes[idx] = { ...ownNotes[idx], ...data, updatedAt: { toDate: () => new Date() } }; }
    } else {
      ownNotes.unshift({ id: 'local-' + Date.now(), ...data, updatedAt: { toDate: () => new Date() } });
    }
    render();
    toast('Notiz gespeichert (offline).');
    closeNoteModal();
  }
});

function closeNoteModal() {
  editingNoteId = null;
  document.getElementById('noteModal').classList.remove('open');
  document.getElementById('n_title').value = '';
  document.getElementById('n_body').value  = '';
  document.getElementById('n_tags').value  = '';
  document.getElementById('noteModalTitle').textContent = 'Eigene Notiz';
}

// ── MODAL-EVENTS ──
document.getElementById('fabNewNote').addEventListener('click', () => {
  editingNoteId = null;
  closeNoteModal();
  document.getElementById('noteModal').classList.add('open');
});
document.getElementById('closeNoteModal').addEventListener('click', closeNoteModal);
document.getElementById('cancelNoteModal').addEventListener('click', closeNoteModal);
document.getElementById('closeViewModal').addEventListener('click', () =>
  document.getElementById('viewModal').classList.remove('open')
);
document.getElementById('noteModal').addEventListener('click', e => {
  if (e.target === document.getElementById('noteModal')) closeNoteModal();
});
document.getElementById('viewModal').addEventListener('click', e => {
  if (e.target === document.getElementById('viewModal'))
    document.getElementById('viewModal').classList.remove('open');
});

// ── SUCHE ──
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  searchClear.style.display = searchQuery ? 'block' : 'none';
  render();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.style.display = 'none';
  render();
});

// ── FILTER TABS ──
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-tab');
  if (!btn) return;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.cat;
  render();
});

// ── FIREBASE LADEN ──
onAuthStateChanged(auth, user => {
  if (!user) {
    // Nicht eingeloggt: nur Lesezugriff auf öffentliche Daten (oder weiterleiten)
    setSyncStatus('Nicht eingeloggt', false);
  }

  // Kontakte live
  onSnapshot(
    query(collection(db, 'contacts'), orderBy('createdAt', 'desc')),
    snap => {
      contacts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
      setSyncStatus('Synchronisiert');
    },
    err => {
      console.warn('Kontakte Fehler:', err.message);
      setSyncStatus('Offline – Kontakte nicht verfügbar', false);
      render();
    }
  );

  // Eigene Notizen live
  onSnapshot(
    query(collection(db, 'ownNotes'), orderBy('updatedAt', 'desc')),
    snap => {
      ownNotes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    },
    err => {
      console.warn('Eigene Notizen Fehler:', err.message);
    }
  );
});
</script>
</body>
</html>
