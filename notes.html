<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notizen – Lead Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #202124;
      --bg2:      #2d2e30;
      --bg3:      #3c4043;
      --bg4:      #444746;
      --border:   rgba(255,255,255,0.10);
      --border2:  rgba(255,255,255,0.18);
      --text:     #e8eaed;
      --text2:    #bdc1c6;
      --text3:    #9aa0a6;
      --text4:    #80868b;
      --blue:     #8ab4f8;
      --green:    #81c995;
      --yellow:   #fdd663;
      --red:      #f28b82;
      --pink:     #ff8bcb;
      --purple:   #d7aefb;
      --teal:     #78d9ec;
      --orange:   #fcad70;
      --sand:     #e6c9a8;

      /* Kategorie-Akzente */
      --c-mandant: #8ab4f8;
      --c-privat:  #fdd663;
      --c-mitarb:  #d7aefb;
      --c-mandm:   #78d9ec;
      --c-eigen:   #81c995;

      /* Note card Hintergrund-Varianten (wie Google Keep) */
      --note-default: #2d2e30;
      --note-red:    #5c2b29;
      --note-orange: #614a19;
      --note-yellow: #635d19;
      --note-green:  #1e3a29;
      --note-teal:   #1b4b4d;
      --note-blue:   #1c3557;
      --note-purple: #42275e;
      --note-pink:   #5b1e44;
      --note-gray:   #3c4043;

      --sidebar-w: 280px;
      --topbar-h: 64px;
      --radius: 12px;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--topbar-h);
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px 0 8px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .topbar-back {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 20px; flex-shrink: 0;
      text-decoration: none; transition: background .15s;
    }
    .topbar-back:hover { background: var(--bg3); }
    .topbar-logo {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px; font-weight: 500; color: var(--text);
      margin-right: 12px; white-space: nowrap;
    }
    .topbar-logo span { color: var(--yellow); }

    /* Suchleiste wie Google Keep */
    .search-wrap {
      flex: 1; max-width: 700px; margin: 0 auto;
    }
    .search-box {
      position: relative;
      background: var(--bg3);
      border-radius: 24px;
      border: 1px solid transparent;
      transition: all .2s;
      display: flex; align-items: center;
    }
    .search-box:focus-within {
      background: var(--bg2);
      border-color: var(--border2);
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .search-box i.search-icon {
      position: absolute; left: 14px;
      color: var(--text3); font-size: 20px; pointer-events: none;
    }
    .search-box input {
      width: 100%;
      padding: 10px 44px 10px 48px;
      background: none; border: none;
      color: var(--text); font-family: 'Roboto', sans-serif;
      font-size: 16px; font-weight: 400; outline: none;
    }
    .search-box input::placeholder { color: var(--text4); font-weight: 400; }
    .search-clear {
      position: absolute; right: 10px;
      background: none; border: none;
      color: var(--text3); cursor: pointer;
      font-size: 18px; padding: 6px; border-radius: 50%;
      display: none; transition: background .15s;
    }
    .search-clear:hover { background: var(--bg4); }

    .topbar-actions {
      display: flex; align-items: center; gap: 4px; margin-left: 8px;
    }
    .topbar-icon-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: none; border: none;
      color: var(--text3); cursor: pointer; font-size: 20px;
      transition: background .15s; flex-shrink: 0;
    }
    .topbar-icon-btn:hover { background: var(--bg3); }
    .topbar-icon-btn.active { color: var(--blue); }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: var(--topbar-h);
      min-height: calc(100vh - var(--topbar-h));
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: fixed;
      top: var(--topbar-h);
      left: 0; bottom: 0;
      overflow-y: auto;
      padding: 8px 0;
      z-index: 100;
    }
    .sidebar-section {
      padding: 12px 16px 4px;
      font-size: 11px; font-weight: 500; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text4);
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 16px; border-radius: 0 24px 24px 0;
      color: var(--text2); font-size: 14px; font-weight: 400;
      cursor: pointer; transition: background .15s;
      user-select: none;
      margin-right: 16px;
      position: relative;
    }
    .sidebar-item:hover { background: var(--bg3); }
    .sidebar-item.active {
      background: #394457;
      color: var(--text);
      font-weight: 500;
    }
    .sidebar-item i { font-size: 18px; flex-shrink: 0; }
    .sidebar-item .label-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar-item .item-count {
      margin-left: auto;
      font-size: 12px; color: var(--text4);
    }
    .sidebar-divider {
      height: 1px; background: var(--border);
      margin: 8px 16px;
    }

    /* Label-Manager Knopf */
    .sidebar-label-add {
      display: flex; align-items: center; gap: 16px;
      padding: 8px 16px;
      color: var(--text3); font-size: 13px;
      cursor: pointer; transition: color .15s;
      margin-right: 16px;
    }
    .sidebar-label-add:hover { color: var(--text); }

    /* ── MAIN CONTENT ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 24px 16px 80px;
      max-width: 1200px;
    }

    /* ── NEW NOTE COMPOSER (Google Keep Stil) ── */
    .composer-wrap {
      max-width: 600px; margin: 0 auto 32px;
    }
    .composer {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      transition: box-shadow .2s;
    }
    .composer:focus-within {
      box-shadow: 0 4px 20px rgba(0,0,0,.35);
    }
    .composer-collapsed {
      display: flex; align-items: center;
      padding: 14px 16px; gap: 12px;
      cursor: text;
    }
    .composer-collapsed input {
      flex: 1; background: none; border: none;
      color: var(--text); font-family: 'Roboto', sans-serif;
      font-size: 15px; outline: none; cursor: text;
    }
    .composer-collapsed input::placeholder { color: var(--text4); }
    .composer-collapsed .comp-icons {
      display: flex; gap: 4px;
    }
    .comp-icon-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: none; border: none;
      color: var(--text3); font-size: 18px; cursor: pointer;
      transition: background .15s;
    }
    .comp-icon-btn:hover { background: var(--bg3); }

    .composer-expanded { display: none; }
    .composer.open .composer-collapsed { display: none; }
    .composer.open .composer-expanded { display: block; }

    .comp-title {
      width: 100%; padding: 14px 16px 4px;
      background: none; border: none;
      color: var(--text); font-family: 'Google Sans', sans-serif;
      font-size: 16px; font-weight: 500; outline: none;
    }
    .comp-title::placeholder { color: var(--text4); }
    .comp-body {
      width: 100%; padding: 4px 16px 8px;
      background: none; border: none; resize: none;
      color: var(--text2); font-family: 'Roboto', sans-serif;
      font-size: 14px; line-height: 1.6; outline: none;
      min-height: 80px;
    }
    .comp-body::placeholder { color: var(--text4); }

    .comp-label-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 6px 16px 8px;
    }
    .comp-label-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px; font-weight: 500;
      border: 1px solid var(--border2);
      cursor: pointer; transition: all .15s;
    }
    .comp-label-chip .dot { width: 6px; height: 6px; border-radius: 50%; }

    .comp-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px 10px;
      border-top: 1px solid var(--border);
    }
    .comp-footer-left { display: flex; align-items: center; gap: 4px; }
    .comp-close-btn {
      padding: 6px 16px; border-radius: 6px;
      background: none; border: none;
      color: var(--text2); font-size: 13px; font-weight: 500;
      font-family: 'Roboto', sans-serif; cursor: pointer;
      transition: background .15s;
    }
    .comp-close-btn:hover { background: var(--bg3); }
    .comp-save-btn {
      padding: 6px 16px; border-radius: 6px;
      background: none; border: none;
      color: var(--text); font-size: 13px; font-weight: 500;
      font-family: 'Roboto', sans-serif; cursor: pointer;
      transition: background .15s;
    }
    .comp-save-btn:hover { background: var(--bg3); }

    /* Farb-Picker */
    .color-picker-row {
      display: flex; gap: 6px; padding: 8px 16px;
      flex-wrap: wrap;
    }
    .color-dot {
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform .15s, border-color .15s;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.selected { border-color: white; }

    /* Label Chooser in Composer */
    .label-chooser-popup {
      position: absolute;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 0;
      min-width: 200px;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      z-index: 300;
      display: none;
    }
    .label-chooser-popup.open { display: block; }
    .label-chooser-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; cursor: pointer; font-size: 13px;
      transition: background .12s;
    }
    .label-chooser-item:hover { background: var(--bg3); }
    .label-chooser-item input[type=checkbox] { accent-color: var(--blue); }
    .label-chooser-item .lc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── NOTES MASONRY GRID ── */
    .notes-section-title {
      font-size: 11px; font-weight: 500; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text4);
      padding: 8px 4px 16px;
    }
    .notes-grid {
      columns: 4 220px;
      column-gap: 12px;
    }
    .notes-grid .note-card {
      break-inside: avoid;
      margin-bottom: 12px;
    }

    /* ── NOTE CARD ── */
    .note-card {
      background: var(--note-default);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow .15s, transform .1s;
      cursor: pointer;
      position: relative;
    }
    .note-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      transform: translateY(-1px);
    }
    .note-card:hover .note-actions { opacity: 1; }
    .note-card:hover .note-card-bg-actions { opacity: 1; }

    .note-card-inner { padding: 14px 14px 8px; }

    .note-title {
      font-family: 'Google Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      color: var(--text); line-height: 1.4;
      margin-bottom: 6px;
      word-break: break-word;
    }
    .note-text {
      font-size: 13px; color: var(--text2);
      line-height: 1.6; white-space: pre-wrap;
      word-break: break-word;
      /* Clamp to max 8 lines */
      display: -webkit-box;
      -webkit-line-clamp: 8;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .note-text mark {
      background: rgba(253,214,99,.35);
      color: var(--text); border-radius: 2px; padding: 0 1px;
    }

    .note-labels {
      display: flex; flex-wrap: wrap; gap: 5px;
      padding: 8px 14px 4px;
    }
    .note-label-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px; font-weight: 500;
      border: 1px solid var(--border2);
    }
    .note-label-chip .dot { width: 6px; height: 6px; border-radius: 50%; }

    /* Note source badge */
    .note-source-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px; font-weight: 500;
      border: 1px solid;
      margin: 8px 14px 4px;
    }

    /* Bottom action bar (shown on hover) */
    .note-card-bg-actions {
      display: flex; align-items: center;
      padding: 4px 6px 6px;
      opacity: 0; transition: opacity .15s;
      gap: 2px;
    }
    .note-actions { display: flex; gap: 2px; }
    .note-act-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: none; border: none;
      color: var(--text3); cursor: pointer; font-size: 16px;
      transition: background .12s;
    }
    .note-act-btn:hover { background: rgba(255,255,255,.08); color: var(--text); }
    .note-act-btn.danger:hover { color: var(--red); }

    /* Archived badge */
    .archived-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 11px; color: var(--text4);
      display: flex; align-items: center; gap: 4px;
    }

    /* Pin icon */
    .pin-icon {
      position: absolute; top: 10px; right: 10px;
      color: var(--text3); font-size: 16px;
    }

    /* ── LEERER ZUSTAND ── */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px; color: var(--text4);
      text-align: center;
    }
    .empty-state i { font-size: 96px; display: block; margin-bottom: 16px; opacity: .3; }
    .empty-state p { font-size: 16px; font-weight: 400; }
    .empty-state small { font-size: 14px; margin-top: 6px; display: block; }

    /* ── MODAL ── */
    .modal-bd {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 500;
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-bd.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 16px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      animation: modalIn .18s ease;
    }
    .modal.wide { max-width: 720px; }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 {
      font-family: 'Google Sans', sans-serif;
      font-size: 16px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }
    .modal-body { padding: 16px 24px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer {
      padding: 12px 24px 18px;
      display: flex; gap: 8px; justify-content: flex-end;
      border-top: 1px solid var(--border);
    }

    .field label {
      display: block; font-size: 11px; font-weight: 500; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text4); margin-bottom: 6px;
    }
    .field input, .field textarea {
      width: 100%; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Roboto', sans-serif; font-size: 14px;
      outline: none; resize: vertical; transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--blue); }
    .field input::placeholder, .field textarea::placeholder { color: var(--text4); }

    .btn-primary {
      padding: 8px 18px; border-radius: 8px;
      background: #394457; color: var(--blue);
      font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500;
      border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background .15s;
    }
    .btn-primary:hover { background: #445066; }
    .btn-ghost {
      padding: 8px 16px; border-radius: 8px;
      background: none; color: var(--text2);
      font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500;
      border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background .15s;
    }
    .btn-ghost:hover { background: var(--bg3); }
    .icon-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: none; border: none;
      color: var(--text3); cursor: pointer; font-size: 20px;
      transition: background .15s;
    }
    .icon-btn:hover { background: var(--bg3); color: var(--text); }

    /* ── LABEL MANAGER ── */
    .label-cat-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 500; letter-spacing: .05em;
      text-transform: uppercase; color: var(--text4);
      padding: 12px 0 6px;
    }
    .label-cat-header .cat-dot { width: 8px; height: 8px; border-radius: 50%; }

    .label-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .label-list-item:last-child { border-bottom: none; }
    .label-list-item .lli-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .label-list-item .lli-name {
      flex: 1; font-size: 14px; color: var(--text);
      background: none; border: none; outline: none;
      font-family: 'Roboto', sans-serif;
    }
    .label-list-item .lli-actions { display: flex; gap: 2px; }
    .lli-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: none; border: none;
      color: var(--text3); cursor: pointer; font-size: 15px;
      transition: background .12s;
    }
    .lli-btn:hover { background: var(--bg3); color: var(--text); }
    .lli-btn.danger:hover { color: var(--red); }

    /* ── 3-SCHRITT LABEL-LÖSCH-FLOW ── */
    .label-delete-confirm {
      display: none;
      margin-top: 6px; padding: 10px 12px;
      background: rgba(242,139,130,.08);
      border: 1px solid rgba(242,139,130,.25);
      border-radius: 8px;
      flex-direction: column; gap: 8px;
    }
    .label-delete-confirm.visible { display: flex; }
    .label-delete-confirm .del-msg {
      font-size: 12px; color: var(--text2); line-height: 1.5;
    }
    .label-delete-confirm .del-msg strong { color: var(--red); }
    .label-delete-confirm .del-note-count {
      display: block; margin-top: 2px;
      font-size: 11px; color: var(--text4);
    }
    .label-delete-confirm .del-type-hint {
      font-size: 11px; color: var(--text4); margin-bottom: 2px;
    }
    .label-delete-confirm .del-input {
      padding: 7px 10px;
      background: var(--bg2); border: 1px solid rgba(242,139,130,.35);
      border-radius: 6px; color: var(--text);
      font-family: 'Roboto', sans-serif; font-size: 13px; outline: none;
      transition: border-color .15s; width: 100%;
    }
    .label-delete-confirm .del-input:focus { border-color: var(--red); }
    .label-delete-confirm .del-input::placeholder { color: var(--text4); }
    .label-delete-confirm .del-actions { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }
    .del-cancel-btn {
      padding: 5px 12px; border-radius: 6px;
      background: none; border: 1px solid var(--border2);
      color: var(--text3); font-size: 12px; font-weight: 500;
      font-family: 'Roboto', sans-serif; cursor: pointer;
      transition: background .12s;
    }
    .del-cancel-btn:hover { background: var(--bg3); color: var(--text); }
    .del-confirm-btn {
      padding: 5px 12px; border-radius: 6px;
      background: rgba(242,139,130,.12); border: 1px solid rgba(242,139,130,.3);
      color: var(--red); font-size: 12px; font-weight: 500;
      font-family: 'Roboto', sans-serif; cursor: pointer;
      opacity: .4; pointer-events: none;
      transition: all .15s;
    }
    .del-confirm-btn.ready { opacity: 1; pointer-events: auto; }
    .del-confirm-btn.ready:hover { background: rgba(242,139,130,.25); }

    .new-label-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px;
    }
    .new-label-input {
      flex: 1; padding: 8px 12px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Roboto', sans-serif; font-size: 13px; outline: none;
      transition: border-color .15s;
    }
    .new-label-input:focus { border-color: var(--blue); }
    .new-label-input::placeholder { color: var(--text4); }
    .new-label-add-btn {

    .swatch.selected { border-color: white; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text); font-size: 13px; font-weight: 500;
      padding: 10px 18px; border-radius: 8px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.3); z-index: 9999;
      animation: toastIn .2s ease, toastOut .3s ease 2.7s forwards;
      white-space: nowrap;
    }
    @keyframes toastIn  { from { opacity:0; transform: translateX(-50%) translateY(8px); } }
    @keyframes toastOut { to   { opacity:0; transform: translateX(-50%) translateY(8px); } }

    /* ── LOADING ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 60px; color: var(--text3);

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border2); border-top-color: var(--yellow);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sync indicator */
    #syncDot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      transition: background .3s;
    }
    #syncDot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    /* Mikrofon-FAB Aufnahme-Puls */
    @keyframes micPulse {
      0%   { box-shadow: 0 0 0 0 rgba(242,139,130,.6); }
      70%  { box-shadow: 0 0 0 12px rgba(242,139,130,0); }
      100% { box-shadow: 0 0 0 0 rgba(242,139,130,0); }
    }
    #fabMic.recording { animation: micPulse 1.2s infinite; border-color: var(--red) !important; }

    /* Keyboard-Shortcut-Badge */
    .kbd-hint {
      font-size:10px;color:var(--text4);background:var(--bg3);
      border:1px solid var(--border);border-radius:4px;

    /* ── LAYOUT MODE TOGGLE ── */
    .view-toggle { display: flex; gap: 4px; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, deleteDoc, onSnapshot, orderBy, query, serverTimestamp, writeBatch
} from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";

// ── FIREBASE ──
const firebaseConfig = {
  apiKey:            "AIzaSyBxiDftvsNOfElvrt8hhLaUA0HDoSyuK-g",
  authDomain:        "tracking-74513.firebaseapp.com",
  projectId:         "tracking-74513",
  storageBucket:     "tracking-74513.firebasestorage.app",
  messagingSenderId: "621239887005",
  appId:             "1:621239887005:web:5b962abff5c9109a546074",
};
const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const auth  = getAuth(fbApp);

// ── STATE ──
let contacts     = [];
let ownNotes     = [];      // Eigene Notizen {id, title, text, labelIds, color, archived, pinned, updatedAt}
let labels       = [];      // Labels {id, name, color, category}  category: 'eigen'|'mandant'|'mitarbeiter'|'privat'|'mandantMitarbeiter'
let currentView  = 'notes'; // 'notes'|'contacts'|'archive'|'mandant'|'privat'|'mitarbeiter'|'mandantMitarbeiter'|label_id
let searchQuery  = '';
let listView     = false;
let editingId    = null;    // ID der Notiz im Edit-Modal

// ── KATEGORIE-CONFIG ──
const CAT = {
  mandant:            { label: 'Mandant',     color: '#8ab4f8', icon: 'ti-briefcase' },
  privat:             { label: 'Privat',      color: '#fdd663', icon: 'ti-heart' },
  mitarbeiter:        { label: 'Mitarbeiter', color: '#d7aefb', icon: 'ti-users' },
  mandantMitarbeiter: { label: 'Mand. (MA)',  color: '#78d9ec', icon: 'ti-user-plus' },
  eigen:              { label: 'Eigene',      color: '#81c995', icon: 'ti-pencil' },
};

const LABEL_COLORS = ['#f28b82','#fcad70','#fdd663','#81c995','#78d9ec','#8ab4f8','#d7aefb','#ff8bcb','#e6c9a8','#aecbfa','#bdc1c6'];
const NOTE_BG_COLORS = {
  default: 'var(--note-default)',
  red:    'var(--note-red)',
  orange: 'var(--note-orange)',
  yellow: 'var(--note-yellow)',
  green:  'var(--note-green)',
  teal:   'var(--note-teal)',
  blue:   'var(--note-blue)',
  purple: 'var(--note-purple)',
  pink:   'var(--note-pink)',
  gray:   'var(--note-gray)',
};
const NOTE_BG_LIST = [
  { key: 'default', hex: '#2d2e30' },
  { key: 'red',    hex: '#5c2b29' },
  { key: 'orange', hex: '#614a19' },
  { key: 'yellow', hex: '#635d19' },
  { key: 'green',  hex: '#1e3a29' },
  { key: 'teal',   hex: '#1b4b4d' },
  { key: 'blue',   hex: '#1c3557' },
  { key: 'purple', hex: '#42275e' },
  { key: 'pink',   hex: '#5b1e44' },
  { key: 'gray',   hex: '#3c4043' },
];

// ── LABEL-KATEGORIE-ZUORDNUNG ──
// Labels gehören zu einer Kategorie; 'eigen' = persönliche Labels, 'mandant' etc. für Kontaktkategorien
const LABEL_CATEGORIES = [
  { key: 'eigen',              label: 'Meine Notizen',    color: '#81c995' },
  { key: 'mandant',            label: 'Mandanten',        color: '#8ab4f8' },
  { key: 'mitarbeiter',        label: 'Mitarbeiter',      color: '#d7aefb' },
  { key: 'mandantMitarbeiter', label: 'Mandant (MA)',     color: '#78d9ec' },
  { key: 'privat',             label: 'Privat',           color: '#fdd663' },
];

// ── HELPERS ──
function esc(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hl(text, q) {
  if (!q || !text) return esc(text || '');
  const e = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(text).replace(new RegExp(e,'gi'), m => `<mark>${m}</mark>`);
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)    return 'Gerade eben';
  if (diff < 3600)  return `vor ${Math.floor(diff/60)} Min.`;
  if (diff < 86400) return `vor ${Math.floor(diff/3600)} Std.`;
  if (diff < 86400*7) return d.toLocaleDateString('de-DE',{weekday:'long'});
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
}
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast';
  const icon = type==='success'?'ti-check':'ti-alert-circle';
  const col  = type==='success'?'var(--green)':'var(--red)';
  el.innerHTML = `<i class="ti ${icon}" style="color:${col};"></i> ${msg}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}
function setSyncing(v) {
  const dot = document.getElementById('syncDot');
  if (v) dot.classList.add('syncing'); else dot.classList.remove('syncing');
}

// ── NOTIZEN: Kontakt-Notizen aufbauen ──
function buildContactNotes() {
  const out = [];
  for (const c of contacts) {
    const cat  = c.contactCategory || null;
    const name = `${c.vorname||''} ${c.nachname||''}`.trim() || '—';
    const push = (id, title, text, subType) => {
      if (!text || !text.trim()) return;
      out.push({ id, personId:c.id, person:name, category:cat, title, text,
        updatedAt: c.updatedAt||c.createdAt||null, source:'contact', subType, _contact:c });
    };
    push(`cn-${c.id}-n`, `Notiz – ${name}`, c.notizen, 'notiz');
    push(`cn-${c.id}-wv`, `Terminnotiz – ${name}`, c.wvNote, 'wv');
    if (Array.isArray(c.history)) {
      c.history.forEach((h,i) => {
        if (h.note?.trim()) {
          out.push({ id:`cn-${c.id}-h${i}`, personId:c.id, person:name, category:cat,
            title:`Verlauf – ${name}`, text:h.note,
            updatedAt: h.datetime ? { toDate:()=>new Date(h.datetime) } : null,
            source:'contact', histType:h.type, _contact:c });
        }
      });
    }
  }
  return out;
}

function allOwnNotes(inclArchived=false) {
  return ownNotes
    .filter(n => inclArchived ? true : !n.archived)
    .sort((a,b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      const ta = a.updatedAt?.toDate ? a.updatedAt.toDate() : new Date(a.updatedAt||0);
      const tb = b.updatedAt?.toDate ? b.updatedAt.toDate() : new Date(b.updatedAt||0);
      return tb - ta;
    });
}

// ── SIDEBAR RENDERN ──
function renderSidebar() {
  const own    = allOwnNotes().length;
  const arc    = ownNotes.filter(n=>n.archived).length;
  const cNotes = buildContactNotes();
  document.getElementById('cnt-notes').textContent    = own    || '';
  document.getElementById('cnt-archive').textContent  = arc    || '';
  document.getElementById('cnt-contacts').textContent = cNotes.length || '';

  const cats = ['mandant','privat','mitarbeiter','mandantMitarbeiter'];
  cats.forEach(c => {
    const cnt = cNotes.filter(n=>n.category===c).length;
    const elId = c==='mandantMitarbeiter'?'cnt-mandantMA':`cnt-${c}`;
    const el = document.getElementById(elId);
    if (el) el.textContent = cnt || '';
  });

  // Labels
  const lb = document.getElementById('labelSidebarList');
  lb.innerHTML = '';
  labels.forEach(l => {
    const div = document.createElement('div');
    div.className = 'sidebar-item' + (currentView===l.id ? ' active' : '');
    div.dataset.view = l.id;
    div.innerHTML = `
      <div class="label-dot" style="background:${l.color};"></div>
      <span style="flex:1;font-size:14px;">${esc(l.name)}</span>
      <span class="item-count">${ownNotes.filter(n=>!n.archived&&(n.labelIds||[]).includes(l.id)).length||''}</span>`;
    div.addEventListener('click', () => setView(l.id));
    lb.appendChild(div);
  });

  // Aktive Markierung
  document.querySelectorAll('.sidebar-item[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === currentView);
  });
}

// ── HAUPTBEREICH RENDERN ──
function render() {
  const q = searchQuery.toLowerCase().trim();
  const area = document.getElementById('notesArea');
  area.innerHTML = '';

  if (currentView === 'contacts' || ['mandant','privat','mitarbeiter','mandantMitarbeiter'].includes(currentView)) {
    renderContactNotes(area, q);
    return;
  }
  if (currentView === 'archive') {
    renderArchive(area, q);
    return;
  }
  // Label-View?
  const labelObj = labels.find(l => l.id === currentView);
  if (labelObj) {
    renderLabelView(area, q, labelObj);
    return;
  }
  // Standard: eigene Notizen
  renderOwnNotes(area, q);
}

function renderOwnNotes(area, q) {
  let notes = allOwnNotes();
  if (q) notes = notes.filter(n =>
    (n.title||'').toLowerCase().includes(q) ||
    (n.text||'').toLowerCase().includes(q) ||
    labels.filter(l=>(n.labelIds||[]).includes(l.id)).some(l=>l.name.toLowerCase().includes(q))
  );

  const pinned = notes.filter(n=>n.pinned);
  const other  = notes.filter(n=>!n.pinned);

  area.innerHTML = composerHtml();
  bindComposer();

  if (!notes.length) {
    area.insertAdjacentHTML('beforeend', emptyStateHtml(q ? 'Keine Treffer' : 'Keine Notizen',
      q ? '' : 'Schreibe deine erste Notiz oder starte eine Sprach-Notiz.'));
    return;
  }

  if (pinned.length) {
    area.insertAdjacentHTML('beforeend',`<div class="notes-section-title">Angeheftet</div>`);
    area.insertAdjacentHTML('beforeend', gridHtml(pinned, q));
  }
  if (other.length) {
    if (pinned.length) area.insertAdjacentHTML('beforeend',`<div class="notes-section-title">Weitere Notizen</div>`);
    area.insertAdjacentHTML('beforeend', gridHtml(other, q));
  }
  bindCardActions();
}

function renderArchive(area, q) {
  let notes = ownNotes.filter(n=>n.archived);
  if (q) notes = notes.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.text||'').toLowerCase().includes(q));
  area.innerHTML = `<div class="notes-section-title" style="color:var(--yellow);"><i class="ti ti-archive"></i> Archiviert (${notes.length})</div>`;
  if (!notes.length) {
    area.insertAdjacentHTML('beforeend', emptyStateHtml('Kein Archiv','Archivierte Notizen erscheinen hier.'));
    return;
  }
  area.insertAdjacentHTML('beforeend', gridHtml(notes, q));
  bindCardActions();
}

function renderContactNotes(area, q) {
  let notes = buildContactNotes();
  if (currentView !== 'contacts') notes = notes.filter(n=>n.category===currentView);
  if (q) notes = notes.filter(n=>
    (n.title||'').toLowerCase().includes(q)||
    (n.text||'').toLowerCase().includes(q)||
    (n.person||'').toLowerCase().includes(q)
  );

  const catConfig = CAT[currentView];
  const title = catConfig ? catConfig.label : 'Kontakt-Notizen';
  const col   = catConfig ? catConfig.color : 'var(--text3)';

  area.innerHTML = `<div class="notes-section-title" style="color:${col};">${esc(title)} (${notes.length})</div>`;
  if (!notes.length) {
    area.insertAdjacentHTML('beforeend', emptyStateHtml('Keine Notizen','Notizen aus Kontaktprofilen erscheinen hier.'));
    return;
  }
  area.insertAdjacentHTML('beforeend', gridHtml(notes, q, true));
  bindCardActions();
}

function renderLabelView(area, q, labelObj) {
  let notes = allOwnNotes().filter(n=>(n.labelIds||[]).includes(labelObj.id));
  if (q) notes = notes.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.text||'').toLowerCase().includes(q));
  area.innerHTML = `<div class="notes-section-title"><i class="ti ti-tag" style="font-size:13px;"></i>
    <span style="display:inline-flex;align-items:center;gap:6px;">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${labelObj.color};"></span>
      ${esc(labelObj.name)} (${notes.length})
    </span></div>`;
  if (!notes.length) {
    area.insertAdjacentHTML('beforeend', emptyStateHtml('Keine Notizen mit diesem Label',''));
    return;
  }
  area.insertAdjacentHTML('beforeend', gridHtml(notes, q));
  bindCardActions();
}

// ── GRID HTML ──
function gridHtml(notes, q, isContact=false) {
  return `<div class="notes-grid ${listView ? 'list-view' : ''}">
    ${notes.map(n => cardHtml(n, q, isContact)).join('')}
  </div>`;
}

function cardHtml(n, q, isContact=false) {
  const bgKey = n.color || 'default';
  const bgColor = NOTE_BG_COLORS[bgKey] || 'var(--note-default)';

  // Labels
  const noteLabels = isContact ? [] : (n.labelIds||[]).map(id=>labels.find(l=>l.id===id)).filter(Boolean);
  const labelsHtml = noteLabels.length ? `
    <div class="note-labels">
      ${noteLabels.map(l=>`<span class="note-label-chip">
        <span class="dot" style="background:${l.color};"></span>${esc(l.name)}
      </span>`).join('')}
    </div>` : '';

  // Kategorie-Badge für Kontaktnotizen
  const catCfg = isContact && n.category ? CAT[n.category] : null;
  const sourceBadge = isContact ? `
    <div class="note-source-badge" style="color:${catCfg?catCfg.color:'var(--text4)'};border-color:${catCfg?catCfg.color+'50':'var(--border)'};font-size:10px;">
      <i class="ti ${catCfg?catCfg.icon:'ti-user'}" style="font-size:11px;"></i>
      ${esc(n.person||'Kontakt')}
    </div>` : '';

  const preview = (n.text||'').slice(0,320) + ((n.text||'').length>320?'…':'');
  const dateStr = n.updatedAt ? `<span style="font-size:11px;color:var(--text4);">${fmtDate(n.updatedAt)}</span>` : '';

  const pinHtml = n.pinned ? `<div class="pin-icon"><i class="ti ti-pin"></i></div>` : '';
  const arcHtml = n.archived ? `<div class="archived-badge"><i class="ti ti-archive" style="font-size:12px;"></i></div>` : '';

  const editActions = isContact ? `
    <button class="note-act-btn" data-action="goto" data-id="${n.personId||''}" title="Kontakt öffnen">
      <i class="ti ti-arrow-right"></i>
    </button>` : `
    <button class="note-act-btn" data-action="${n.archived?'unarchive':'archive'}" data-id="${n.id}" title="${n.archived?'Aus Archiv':'Archivieren'}">
      <i class="ti ti-archive"></i>
    </button>
    <button class="note-act-btn danger" data-action="delete" data-id="${n.id}" title="Löschen">
      <i class="ti ti-trash"></i>
    </button>`;

  return `
  <div class="note-card" style="background:${bgColor};"
       data-action="open" data-id="${isContact?n.id:n.id}" data-contact="${isContact}">
    ${pinHtml}${arcHtml}
    <div class="note-card-inner">
      ${n.title ? `<div class="note-title">${hl(n.title,q)}</div>` : ''}
      <div class="note-text">${hl(preview,q)}</div>
    </div>
    ${labelsHtml}
    ${sourceBadge}
    <div class="note-card-bg-actions">
      <div class="note-actions">${editActions}</div>
      <div style="margin-left:auto;">${dateStr}</div>
    </div>
  </div>`;
}

function emptyStateHtml(title, sub) {
  return `<div class="empty-state">
    <i class="ti ti-bulb"></i>
    <p>${esc(title)}</p>
    ${sub ? `<small>${esc(sub)}</small>` : ''}
  </div>`;
}

// ── KARTEN-AKTIONEN BINDEN ──
function bindCardActions() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', async e => {
      e.stopPropagation();
      const action = el.dataset.action;
      const id     = el.dataset.id;
      const isContact = el.dataset.contact === 'true';

      if (action === 'open') {
        if (isContact) {
          const n = buildContactNotes().find(x => x.id === id);
          if (n) openContactNoteView(n);
        } else {
          openEditModal(id);
        }
      } else if (action === 'archive') {
        await patchNote(id, { archived: true });
        toast('Notiz archiviert.');
      } else if (action === 'unarchive') {
        await patchNote(id, { archived: false });
        toast('Aus Archiv entfernt.');
      } else if (action === 'delete') {
        if (!confirm('Notiz wirklich löschen?')) return;
        await deleteNote(id);
        toast('Notiz gelöscht.');
      } else if (action === 'goto') {
        sessionStorage.setItem('openContact', id);
        window.location.href = 'index.html';
      }
    });
  });
}

let compSelectedLabels = [];
let compSelectedColor  = 'default';

function bindComposer() {
  const comp    = document.getElementById('composer');
  const trigger = document.getElementById('compTrigger');
  if (!comp) return;

  trigger?.addEventListener('click', () => {
    comp.classList.add('open');
    document.getElementById('compBody')?.focus();
    refreshCompColors();
    refreshCompLabels();
  });

  document.getElementById('compCancel')?.addEventListener('click', () => {
    comp.classList.remove('open');
    compSelectedLabels = [];
    compSelectedColor  = 'default';
    if (document.getElementById('compTitle')) document.getElementById('compTitle').value = '';
    if (document.getElementById('compBody'))  document.getElementById('compBody').value  = '';
    refreshCompLabels();
    refreshCompColors();
  });

  document.getElementById('compSave')?.addEventListener('click', async () => {
    const title = document.getElementById('compTitle')?.value.trim() || '';
    const text  = document.getElementById('compBody')?.value.trim()  || '';
    if (!text && !title) { toast('Bitte etwas eingeben.','error'); return; }
    await saveNewNote({ title, text, labelIds:[...compSelectedLabels], color:compSelectedColor });
    comp.classList.remove('open');
    compSelectedLabels = [];
    compSelectedColor  = 'default';
    if (document.getElementById('compTitle')) document.getElementById('compTitle').value = '';
    if (document.getElementById('compBody'))  document.getElementById('compBody').value  = '';
    toast('Notiz gespeichert!');
  });

  document.getElementById('compLabelBtn')?.addEventListener('click', e => {
    e.stopPropagation();
    const popup = document.getElementById('compLabelPopup');
    popup.classList.toggle('open');
    renderLabelChooser(popup, compSelectedLabels, id => {
      const i = compSelectedLabels.indexOf(id);
      if (i>=0) compSelectedLabels.splice(i,1); else compSelectedLabels.push(id);
      refreshCompLabels();
      renderLabelChooser(popup, compSelectedLabels, arguments.callee);
    });
  });

  document.getElementById('compColorBtn')?.addEventListener('click', e => {
    e.stopPropagation();
    const row = document.getElementById('compColorRow');
    row.style.display = row.style.display === 'none' ? 'flex' : 'none';
  });

  document.addEventListener('click', () => {
    const popup = document.getElementById('compLabelPopup');
    if (popup) popup.classList.remove('open');
  });
}

function refreshCompLabels() {
  const row = document.getElementById('compLabelRow');
  if (!row) return;
  row.innerHTML = compSelectedLabels.map(id => {
    const l = labels.find(x=>x.id===id);
    return l ? `<span class="comp-label-chip" style="color:${l.color};border-color:${l.color}50;">
      <span class="dot" style="background:${l.color};"></span>${esc(l.name)}
    </span>` : '';
  }).join('');
}

function refreshCompColors() {
  const row = document.getElementById('compColorRow');
  if (!row) return;
  row.style.display = 'none';
  row.innerHTML = NOTE_BG_LIST.map(c => `
    <div class="color-dot ${compSelectedColor===c.key?'selected':''}"
         style="background:${c.hex};"
         data-colorkey="${c.key}" title="${c.key}"></div>`).join('');
  row.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', e => {
      e.stopPropagation();
      compSelectedColor = dot.dataset.colorkey;
      refreshCompColors();
      row.style.display = 'flex';
    });
  });
}

// ── EDIT MODAL ──
let nmLabelState = [];
let nmColorState = 'default';

function openEditModal(id) {
  const n = ownNotes.find(x=>x.id===id);
  if (!n) return;
  editingId = id;
  nmLabelState = [...(n.labelIds||[])];
  nmColorState = n.color || 'default';

  document.getElementById('nm_title').value = n.title || '';
  document.getElementById('nm_body').value  = n.text  || '';

  const bgColor = NOTE_BG_COLORS[nmColorState] || 'var(--note-default)';
  document.getElementById('noteModalInner').style.background = bgColor;

  renderNmColors();
  renderNmLabels();
  renderNmLabelPopup();

  const archBtn = document.getElementById('nm_toggleArchive');
  archBtn.title = n.archived ? 'Aus Archiv' : 'Archivieren';
  archBtn.querySelector('i').className = n.archived ? 'ti ti-archive-off' : 'ti ti-archive';

  document.getElementById('noteModal').classList.add('open');
}

function openContactNoteView(n) {
  editingId = null;
  document.getElementById('nm_title').value = n.title || n.person || '';
  document.getElementById('nm_body').value  = n.text  || '';
  document.getElementById('nm_label_area').style.display = 'none';
  document.getElementById('nm_color_area').style.display = 'none';
  document.getElementById('nm_toggleArchive').style.display = 'none';
  document.getElementById('nm_delete').style.display = 'none';
  document.getElementById('nm_save').style.display = 'none';
  document.getElementById('nm_labelBtn').style.display = 'none';
  document.getElementById('noteModal').classList.add('open');
}

function closeEditModal() {
  editingId = null;
  document.getElementById('noteModal').classList.remove('open');
  document.getElementById('nm_label_area').style.display = '';
  document.getElementById('nm_color_area').style.display = '';
  document.getElementById('nm_toggleArchive').style.display = '';
  document.getElementById('nm_delete').style.display = '';
  document.getElementById('nm_save').style.display = '';
  document.getElementById('nm_labelBtn').style.display = '';
  document.getElementById('nm_label_popup').classList.remove('open');
}

function renderNmLabels() {
  const wrap = document.getElementById('nm_labels');
  wrap.innerHTML = nmLabelState.map(id => {
    const l = labels.find(x=>x.id===id);
    return l ? `<span class="full-note-label-chip">
      <span class="dot" style="background:${l.color};"></span>${esc(l.name)}
      <i class="ti ti-x" style="font-size:11px;cursor:pointer;" data-rmlabel="${l.id}"></i>
    </span>` : '';
  }).join('') +
  `<span class="full-note-label-chip" id="addLabelChip" style="cursor:pointer;color:var(--text4);">
     <i class="ti ti-plus" style="font-size:11px;"></i> Label
  </span>`;
  wrap.querySelectorAll('[data-rmlabel]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      nmLabelState = nmLabelState.filter(id=>id!==el.dataset.rmlabel);
      renderNmLabels();
    });
  });
  document.getElementById('addLabelChip')?.addEventListener('click', e => {
    e.stopPropagation();
    const popup = document.getElementById('nm_label_popup');
    popup.classList.toggle('open');
    renderNmLabelPopup();
  });
}

function renderNmLabelPopup() {
  const popup = document.getElementById('nm_label_popup');
  renderLabelChooser(popup, nmLabelState, id => {
    const i = nmLabelState.indexOf(id);
    if (i>=0) nmLabelState.splice(i,1); else nmLabelState.push(id);
    renderNmLabels();
    renderNmLabelPopup();
  });
}

function renderNmColors() {
  const row = document.getElementById('nm_colors');
  row.innerHTML = NOTE_BG_LIST.map(c => `
    <div class="color-dot ${nmColorState===c.key?'selected':''}"
         style="background:${c.hex};" data-colorkey="${c.key}"></div>`).join('');
  row.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', e => {
      e.stopPropagation();
      nmColorState = dot.dataset.colorkey;
      const bg = NOTE_BG_COLORS[nmColorState]||'var(--note-default)';
      document.getElementById('noteModalInner').style.background = bg;
      renderNmColors();
    });
  });
}

function renderLabelChooser(popup, selectedIds, onToggle) {
  if (!labels.length) {
    popup.innerHTML = `<div style="padding:12px 16px;font-size:13px;color:var(--text4);">
      Keine Labels. Zuerst <a href="#" onclick="document.getElementById('openLabelManager').click();return false;" style="color:var(--blue);">Labels erstellen</a>.
    </div>`;
    return;
  }
  popup.innerHTML = labels.map(l => `
    <div class="label-chooser-item" data-lid="${l.id}">
      <input type="checkbox" ${selectedIds.includes(l.id)?'checked':''} />
      <div class="lc-dot" style="background:${l.color};"></div>
      <span>${esc(l.name)}</span>
      <span style="margin-left:auto;font-size:10px;color:var(--text4);">${esc(LABEL_CATEGORIES.find(c=>c.key===l.category)?.label||'')}</span>
    </div>`).join('');
  popup.querySelectorAll('.label-chooser-item').forEach(item => {
    item.addEventListener('click', e => {
      e.stopPropagation();
      onToggle(item.dataset.lid);
    });
  });
}

document.getElementById('nm_labelBtn').addEventListener('click', e => {

// ── FIRESTORE CRUD ──
window.saveNewNote = async function saveNewNote(data) {
  setSyncing(true);
  try {
    await addDoc(collection(db,'ownNotes'), {
      ...data, archived:false, pinned:false,
      createdAt:serverTimestamp(), updatedAt:serverTimestamp()
    });
  } catch(e) {
    ownNotes.unshift({ id:'local-'+Date.now(), ...data,
      archived:false, pinned:false, updatedAt:{ toDate:()=>new Date() }});
    render(); renderSidebar();
  }
  setSyncing(false);
}

async function patchNote(id, patch) {
  setSyncing(true);
  try {
    await updateDoc(doc(db,'ownNotes',id), { ...patch, updatedAt:serverTimestamp() });
  } catch(e) {
    const idx = ownNotes.findIndex(n=>n.id===id);
    if (idx>=0) { ownNotes[idx] = { ...ownNotes[idx], ...patch, updatedAt:{toDate:()=>new Date()} }; }
    render(); renderSidebar();
  }
  setSyncing(false);
}

async function deleteNote(id) {
  setSyncing(true);
  try {
    await deleteDoc(doc(db,'ownNotes',id));
  } catch(e) {
    ownNotes = ownNotes.filter(n=>n.id!==id);
    render(); renderSidebar();
  }
  setSyncing(false);
}

// ── LABEL-MANAGER ──
function openLabelManager() {
  renderLabelManagerModal();
  document.getElementById('labelManagerModal').classList.add('open');
}

function renderLabelManagerModal() {
  const body = document.getElementById('labelManagerBody');
  body.innerHTML = '';

  LABEL_CATEGORIES.forEach(cat => {
    const catLabels = labels.filter(l=>l.category===cat.key);

    const section = document.createElement('div');
    section.innerHTML = `<div class="label-cat-header">
      <div class="cat-dot" style="background:${cat.color};"></div>
      ${esc(cat.label)}
    </div>`;

    // Bestehende Labels
    catLabels.forEach(l => {
      const noteCount = ownNotes.filter(n=>(n.labelIds||[]).includes(l.id)).length;
      const item = document.createElement('div');
      item.className = 'label-list-item';
      item.style.flexDirection = 'column';
      item.style.alignItems = 'stretch';
      item.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="lli-dot" style="background:${l.color};"></div>
          <input class="lli-name" type="text" value="${esc(l.name)}" data-lid="${l.id}" />
          <div class="color-swatches">
            ${LABEL_COLORS.map(c=>`<div class="swatch ${l.color===c?'selected':''}" style="background:${c};"
                data-lid="${l.id}" data-lcolor="${c}"></div>`).join('')}
          </div>
          <div class="lli-actions">
            <button class="lli-btn danger" data-delete-start="${l.id}" title="Label löschen">
              <i class="ti ti-trash"></i>
            </button>
          </div>
        </div>
        <div class="label-delete-confirm" id="del-confirm-${l.id}">
          <div class="del-msg">
            Label <strong>${esc(l.name)}</strong> endgültig löschen?
            <span class="del-note-count">${noteCount > 0
              ? `⚠ Wird von ${noteCount} Notiz${noteCount===1?'':'en'} entfernt.`
              : 'Wird von keiner Notiz verwendet.'}</span>
          </div>
          <div class="del-type-hint">Zur Bestätigung den Label-Namen eingeben:</div>
          <input class="del-input" type="text" placeholder="${esc(l.name)}"
            data-expected="${esc(l.name)}" data-lid="${l.id}" autocomplete="off" />
          <div class="del-actions">
            <button class="del-cancel-btn" data-delete-cancel="${l.id}">Abbrechen</button>
            <button class="del-confirm-btn" data-delete-confirm="${l.id}" disabled>
              <i class="ti ti-trash" style="font-size:12px;"></i> Endgültig löschen
            </button>
          </div>
        </div>`;
      section.appendChild(item);
    });

    // Neues Label hinzufügen
    const addRow = document.createElement('div');
    addRow.className = 'new-label-row';
    addRow.innerHTML = `
      <input class="new-label-input" type="text" placeholder="Neues Label für ${esc(cat.label)}…" data-newcat="${cat.key}" data-newcolor="${LABEL_COLORS[0]}" />
      <div class="color-swatches" style="margin-right:4px;">
        ${LABEL_COLORS.slice(0,6).map(c=>`<div class="swatch ${c===LABEL_COLORS[0]?'selected':''}" style="background:${c};" data-pickercat="${cat.key}" data-pcolor="${c}"></div>`).join('')}
      </div>
      <button class="new-label-add-btn" data-addcat="${cat.key}"><i class="ti ti-plus"></i> Hinzufügen</button>`;
    section.appendChild(addRow);

    body.appendChild(section);
  });

  // Events
  body.querySelectorAll('.lli-name').forEach(inp => {
    inp.addEventListener('change', async () => {
      const lid = inp.dataset.lid;
      const newName = inp.value.trim();
      if (!newName) return;
      await saveLabelPatch(lid, { name: newName });
    });
  });

  body.querySelectorAll('.swatch[data-lid]').forEach(sw => {
    sw.addEventListener('click', async () => {
      const lid = sw.dataset.lid;
      const color = sw.dataset.lcolor;
      await saveLabelPatch(lid, { color });
      renderLabelManagerModal();
    });
  });

  body.querySelectorAll('[data-delete-start]').forEach(btn => {
    btn.addEventListener('click', () => {
      const lid = btn.dataset.deleteStart;
      // Alle anderen offenen Confirm-Boxen schließen (Schritt 1)
      body.querySelectorAll('.label-delete-confirm.visible').forEach(el => {
        if (el.id !== `del-confirm-${lid}`) el.classList.remove('visible');
      });
      // Schritt 1 → Box anzeigen
      const box = document.getElementById(`del-confirm-${lid}`);
      if (box) {
        box.classList.toggle('visible');
        if (box.classList.contains('visible')) {
          // Input leeren und fokussieren
          const inp = box.querySelector('.del-input');
          if (inp) { inp.value = ''; inp.focus(); }
          const confirmBtn = box.querySelector('.del-confirm-btn');
          if (confirmBtn) confirmBtn.classList.remove('ready');
        }
      }
    });
  });

  // Schritt 2 → Eingabe prüfen
  body.querySelectorAll('.del-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const lid = inp.dataset.lid;
      const expected = inp.dataset.expected || '';
      const confirmBtn = body.querySelector(`[data-delete-confirm="${lid}"]`);
      if (!confirmBtn) return;
      if (inp.value.trim() === expected.trim()) {
        confirmBtn.classList.add('ready');
        confirmBtn.removeAttribute('disabled');
      } else {
        confirmBtn.classList.remove('ready');
        confirmBtn.setAttribute('disabled', '');
      }
    });
  });

  // Schritt 3 → Endgültig löschen
  body.querySelectorAll('[data-delete-confirm]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!btn.classList.contains('ready')) return;
      const lid = btn.dataset.deleteConfirm;
      await deleteLabel(lid);
      toast('Label gelöscht.');
      renderLabelManagerModal();
      renderSidebar();
    });
  });

  // Abbrechen
  body.querySelectorAll('[data-delete-cancel]').forEach(btn => {
    btn.addEventListener('click', () => {
      const lid = btn.dataset.deleteCancel;
      const box = document.getElementById(`del-confirm-${lid}`);
      if (box) box.classList.remove('visible');
    });
  });

  body.querySelectorAll('.swatch[data-pickercat]').forEach(sw => {
    sw.addEventListener('click', () => {
      const cat  = sw.dataset.pickercat;
      const col  = sw.dataset.pcolor;
      const inp  = body.querySelector(`.new-label-input[data-newcat="${cat}"]`);
      if (inp) inp.dataset.newcolor = col;
      sw.closest('.new-label-row').querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
      sw.classList.add('selected');
    });
  });

  body.querySelectorAll('[data-addcat]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const cat = btn.dataset.addcat;
      const inp = body.querySelector(`.new-label-input[data-newcat="${cat}"]`);
      const name  = inp?.value.trim();
      const color = inp?.dataset.newcolor || LABEL_COLORS[0];
      if (!name) { toast('Bitte Namen eingeben.','error'); return; }
      await createLabel({ name, color, category: cat });
      if (inp) inp.value = '';
      renderLabelManagerModal();
      renderSidebar();
    });
  });
}

async function createLabel(data) {
  try {
    const ref = await addDoc(collection(db,'labels'), { ...data, createdAt:serverTimestamp() });
    labels.push({ id:ref.id, ...data });
    renderSidebar();
  } catch(e) {
    const id = 'local-lbl-'+Date.now();
    labels.push({ id, ...data });
    renderSidebar();
  }
}

async function saveLabelPatch(id, patch) {
  try {
    await updateDoc(doc(db,'labels',id), patch);
    const idx = labels.findIndex(l=>l.id===id);
    if (idx>=0) labels[idx] = { ...labels[idx], ...patch };
    renderSidebar();
  } catch(e) {}
}

async function deleteLabel(id) {
  try {
    await deleteDoc(doc(db,'labels',id));
  } catch(e) {}
  labels = labels.filter(l=>l.id!==id);
  ownNotes.forEach(n => {
    if ((n.labelIds||[]).includes(id)) {
      n.labelIds = n.labelIds.filter(x=>x!==id);
      patchNote(n.id, { labelIds: n.labelIds });
    }
  });
  renderSidebar();
  render();
}

  <!-- Schnell-Notiz Button (Stift) -->

      width:40px;height:40px;border-radius:50%;

      transition:all .2s;
    "
    onmouseover="this.style.background='var(--bg4)';this.style.color='var(--text)'"
    onmouseout="this.style.background='var(--bg3)';this.style.color='var(--text3)'">
    <i class="ti ti-microphone"></i>
  </button>

<script>
// ══════════════════════════════════════════════════════
// SPRACH-NOTIZEN ENGINE (komplett neu)
// ══════════════════════════════════════════════════════
(function() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition   = null;
  let isRecording   = false;
  let baseText      = '';       // gesicherter Text vor Interim
  let vmColor       = 'default';
  let autoStartMic  = false;

  /* Farb-Palette für Voice-Modal */
  const BG_KEYS = [
    { key:'default', hex:'#2d2e30', label:'Standard' },
    { key:'red',    hex:'#5c2b29', label:'Rot' },
    { key:'orange', hex:'#614a19', label:'Orange' },
    { key:'yellow', hex:'#635d19', label:'Gelb' },
    { key:'green',  hex:'#1e3a29', label:'Grün' },
    { key:'teal',   hex:'#1b4b4d', label:'Türkis' },
    { key:'blue',   hex:'#1c3557', label:'Blau' },
    { key:'purple', hex:'#42275e', label:'Lila' },
    { key:'pink',   hex:'#5b1e44', label:'Pink' },
    { key:'gray',   hex:'#3c4043', label:'Grau' },
  ];

  function renderColorPicker() {
    const wrap = document.getElementById('vmColorPicker');
    if (!wrap) return;
    wrap.innerHTML = BG_KEYS.map(c => `
      <button title="${c.label}" data-ckey="${c.key}" onclick="window._vmPickColor('${c.key}')"
        style="width:24px;height:24px;border-radius:50%;
               background:${c.hex};
               border:${c.key===vmColor ? '2.5px solid white' : '2px solid transparent'};
               cursor:pointer;transition:transform .12s,border-color .12s;"
        onmouseover="this.style.transform='scale(1.2)'"
        onmouseout="this.style.transform='scale(1)'">
      </button>`).join('');
  }

  window._vmPickColor = function(key) {
    vmColor = key;
    renderColorPicker();
    const modal = document.getElementById('voiceModal');
    if (modal) {
      const inner = modal.querySelector('div > div');
      if (inner) {
        const bgHex = BG_KEYS.find(c=>c.key===key)?.hex || '#2d2e30';
        // tint the modal slightly
        inner.style.background = bgHex;
      }
    }
  };

  /* Modal öffnen */
  window.openVoiceModal = function(withMic = false) {
    autoStartMic = withMic;
    vmColor = 'default';
    const modal = document.getElementById('voiceModal');
    modal.style.display = 'flex';
    document.getElementById('vmNoteTitle').value = '';
    document.getElementById('vmNoteBody').value  = '';
    document.getElementById('vmInterim').textContent = '';
    document.getElementById('vmTitle').textContent   = withMic ? 'Sprach-Notiz' : 'Schnell-Notiz';
    document.getElementById('vmMicIcon').innerHTML    = withMic ? '<i class="ti ti-microphone"></i>' : '<i class="ti ti-pencil"></i>';
    // reset modal bg
    modal.querySelector('div > div').style.background = 'var(--bg2)';
    renderColorPicker();
    // focus
    setTimeout(() => {
      if (withMic) {
        toggleVoiceRecording();
      } else {
        document.getElementById('vmNoteBody').focus();
      }
    }, 80);
  };

  window.closeVoiceModal = function() {
    if (isRecording) stopRecognition();
    document.getElementById('voiceModal').style.display = 'none';
  };

  /* Aufnahme umschalten */
  window.toggleVoiceRecording = function() {
    if (!SR) {
      alert('Spracherkennung wird in diesem Browser nicht unterstützt.\nBitte Chrome oder Edge verwenden.');
      return;
    }
    if (isRecording) {
      stopRecognition();
    } else {
      startRecognition();
    }
  };

  function startRecognition() {
    recognition = new SR();
    const lang = document.getElementById('vmLang')?.value || 'de-DE';
    recognition.lang           = lang;
    recognition.interimResults = true;
    recognition.continuous     = true;
    recognition.maxAlternatives = 1;

    baseText = document.getElementById('vmNoteBody').value;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('fabMic')?.classList.add('recording');
      const btn = document.getElementById('vmMicBtn');
      btn.style.background    = 'rgba(242,139,130,.15)';
      btn.style.borderColor   = 'var(--red)';
      btn.style.color         = 'var(--red)';
      btn.innerHTML           = '<span style="font-size:16px;">⏹</span> Aufnahme stoppen';
      const st = document.getElementById('vmStatus');
      st.style.display        = 'inline';
      st.style.color          = 'var(--red)';
      st.style.background     = 'rgba(242,139,130,.1)';
      st.innerHTML            = '● Aufnahme läuft';
    };

    recognition.onresult = (e) => {
      let interimText = '';
      let finalText   = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalText += t + ' ';
        } else {
          interimText += t;
        }
      }
      if (finalText) {
        baseText += finalText;
        document.getElementById('vmNoteBody').value = baseText;
        document.getElementById('vmInterim').textContent = '';
      }
      if (interimText) {
        document.getElementById('vmInterim').textContent = '💬 ' + interimText;
      }
      // Auto-resize textarea
      const ta = document.getElementById('vmNoteBody');
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    };

    recognition.onerror = (e) => {
      const msgs = {
        'no-speech':       'Kein Ton erkannt. Bitte sprechen.',
        'audio-capture':   'Kein Mikrofon gefunden.',
        'not-allowed':     'Mikrofonzugriff verweigert.',
        'network':         'Netzwerkfehler. Online sein?',
        'aborted':         '',
      };
      const m = msgs[e.error] || `Fehler: ${e.error}`;
      if (m) showVmToast(m, 'error');
      stopRecognitionUI();
    };

    recognition.onend = () => {
      stopRecognitionUI();
      // Auto-restart if still meant to be recording (Chrome cuts off after ~60s)
      if (isRecording) {
        isRecording = false; // prevent double restart
        // small delay then restart
        setTimeout(() => {
          if (document.getElementById('voiceModal')?.style.display !== 'none') {
            // only restart if user hasn't stopped
          }
        }, 300);
      }
    };

    try {
      recognition.start();
    } catch(e) {
      showVmToast('Konnte Spracherkennung nicht starten.', 'error');
    }
  }

  function stopRecognition() {
    isRecording = false;
    if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
    stopRecognitionUI();
  }

  function stopRecognitionUI() {
    isRecording = false;
    document.getElementById('fabMic')?.classList.remove('recording');
    const btn = document.getElementById('vmMicBtn');
    if (btn) {
      btn.style.background  = '#1c3557';
      btn.style.borderColor = 'var(--blue)';
      btn.style.color       = 'var(--blue)';
      btn.innerHTML         = '<span style="font-size:16px;">🎤</span> Aufnahme starten';
    }
    const st = document.getElementById('vmStatus');
    if (st) { st.style.display = 'none'; }
    document.getElementById('vmInterim').textContent = '';
  }

  /* Als Notiz speichern (ruft globale saveNewNote auf) */
  window.saveVoiceNote = async function() {
    const title = document.getElementById('vmNoteTitle').value.trim();
    const text  = document.getElementById('vmNoteBody').value.trim();
    if (!text && !title) {
      showVmToast('Bitte Text eingeben oder diktieren.', 'error');
      return;
    }
    if (isRecording) stopRecognition();
    try {
      await window.saveNewNote({ title, text, labelIds: [], color: vmColor });
      showVmToast('Notiz gespeichert! ✓', 'success');
      setTimeout(closeVoiceModal, 900);
    } catch(e) {
      showVmToast('Fehler beim Speichern.', 'error');
    }
  };

  /* Mini-Toast im Modal */
  function showVmToast(msg, type) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;
      background:${type==='error'?'rgba(242,139,130,.15)':'rgba(129,201,149,.15)'};
      border:1px solid ${type==='error'?'var(--red)':'var(--green)'};
      color:${type==='error'?'var(--red)':'var(--green)'};
      white-space:nowrap;animation:fadeIn .2s;`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3000);
  }

  /* ── INLINE startVoiceNote für bestehende Buttons im Edit-Modal ── */
  window.startVoiceNote = function(targetId, triggerEl) {
    const ta  = document.getElementById(targetId);
    const btn = triggerEl || (typeof event !== 'undefined' ? event.currentTarget || event.target : null);
    if (!ta) return;

    if (!SR) {
      alert('Spracherkennung nicht verfügbar. Bitte Chrome/Edge verwenden.');
      return;
    }

    // Toggle
    if (recognition && isRecording) {
      stopRecognition();
      return;
    }

    let inlineRecognition = new SR();
    inlineRecognition.lang           = 'de-DE';
    inlineRecognition.interimResults = true;
    inlineRecognition.continuous     = true;
    let inlineBase = ta.value;

    inlineRecognition.onstart = () => {
      if (btn) { btn.textContent='⏹'; btn.style.borderColor='var(--red)'; btn.style.color='var(--red)'; }
    };
    inlineRecognition.onresult = (e) => {
      let fin='', intr='';
      for (let i=e.resultIndex; i<e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) fin += t + ' '; else intr += t;
      }
      if (fin) { inlineBase += fin; ta.value = inlineBase; ta.dispatchEvent(new Event('input',{bubbles:true})); }
    };
    inlineRecognition.onerror = () => {
      if (btn) { btn.textContent='🎤'; btn.style.borderColor='var(--blue)'; btn.style.color='var(--blue)'; }
      inlineRecognition = null;
    };
    inlineRecognition.onend = () => {
      if (btn) { btn.textContent='🎤'; btn.style.borderColor='var(--blue)'; btn.style.color='var(--blue)'; }
      inlineRecognition = null;
    };
    try { inlineRecognition.start(); } catch(e){}
  };

  /* Keyboard Shortcut: Strg+Shift+V → Sprach-Modal */
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key === 'V') {
      e.preventDefault();
      openVoiceModal(true);
    }
    /* Strg+Shift+N → Schnell-Notiz */
    if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key === 'N') {
      e.preventDefault();
      openVoiceModal(false);
    }
    /* ESC schließt Modal */
    if (e.key === 'Escape') {
      const vm = document.getElementById('voiceModal');
      if (vm && vm.style.display !== 'none') closeVoiceModal();
    }
  });

  /* Klick außerhalb schließt Modal */
  document.getElementById('voiceModal').addEventListener('click', function(e) {
    if (e.target === this) closeVoiceModal();
  });

})();
</script>
